                                    </tbody>
                                </table>
                            </div>

                            {/* Section 2: Money Borrowed / Cash Advances */}
                            <div className="mb-8">
                                <h3 className="text-lg font-black uppercase mb-4 border-b border-gray-200 pb-2 avoid-break">Money Borrowed / Advances</h3>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-xs uppercase tracking-widest avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                            <th className="p-3 border border-gray-300 font-bold">Date Requested</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Amount Requested</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Repayment Terms</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Payment Status</th>
                                            <th className="p-3 border border-gray-300 font-bold">Reason Given</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(printingEmployee.advances || [])
                                            .filter(a => a.date >= startDate && a.date <= endDate)
                                            .sort((a,b) => a.date > b.date ? 1 : -1)
                                            .map((a, i) => (
                                            <tr key={i} className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                                <td className="p-3 border border-gray-300">{a.date}</td>
                                                <td className="p-3 border border-gray-300 text-center font-mono font-bold text-emerald-600">R {a.amount.toLocaleString()}</td>
                                                <td className="p-3 border border-gray-300 text-center">{a.months} Month(s)</td>
                                                <td className="p-3 border border-gray-300 text-center font-bold text-xs">
                                                    <span className={a.paidInFull ? 'text-emerald-500' : 'text-red-500'}>
                                                        {a.paidInFull ? 'Paid In Full' : 'Outstanding'}
                                                    </span>
                                                </td>
                                                <td className="p-3 border border-gray-300 text-gray-600 italic text-sm">{a.reason}</td>
                                            </tr>
                                        ))}
                                        {(!printingEmployee.advances || printingEmployee.advances.filter(a => a.date >= startDate && a.date <= endDate).length === 0) && (
                                            <tr className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}><td colSpan="5" className="p-4 text-center text-gray-500 font-bold">No cash advances borrowed in the selected period.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 3: Time Off & Breaks History */}
                            <div className="mb-8">
                                <h3 className="text-lg font-black uppercase mb-4 border-b border-gray-200 pb-2 avoid-break">Time Off / Mid-Shift Breaks</h3>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-xs uppercase tracking-widest avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                            <th className="p-3 border border-gray-300 font-bold">Date Requested</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Departure (Left)</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Return (Returned)</th>
                                            <th className="p-3 border border-gray-300 font-bold">Reason Logged</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(printingEmployee.breaks || [])
                                            .filter(b => b.date >= startDate && b.date <= endDate)
                                            .sort((a,b) => a.date > b.date ? 1 : -1)
                                            .map((b, i) => (
                                            <tr key={i} className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                                <td className="p-3 border border-gray-300">{b.date}</td>
                                                <td className="p-3 border border-gray-300 text-center font-mono">{b.leftAt}</td>
                                                <td className="p-3 border border-gray-300 text-center font-mono">{b.returnedAt || 'On-Going Break'}</td>
                                                <td className="p-3 border border-gray-300 text-gray-600 italic text-sm">{b.reason}</td>
                                            </tr>
                                        ))}
                                        {(!printingEmployee.breaks || printingEmployee.breaks.filter(b => b.date >= startDate && b.date <= endDate).length === 0) && (
                                            <tr className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}><td colSpan="4" className="p-4 text-center text-gray-500 font-bold">No time off or breaks recorded in the selected period.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {printingEmployee.isArchived && (
                                <div className="mb-12 avoid-break">
                                    <h3 className="text-lg font-black uppercase mb-4 border-b border-gray-200 pb-2 text-red-600">Archival Record</h3>
                                    <p className="text-sm"><strong>Archived On:</strong> {printingEmployee.archiveDate}</p>
                                    <p className="text-sm text-red-600 font-bold"><strong>Reason:</strong> {printingEmployee.archiveReason}</p>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-16 mt-20 pt-8 avoid-break">
                                <div className="text-center">
                                    <div className="border-b border-black mb-2 h-10"></div>
                                    <p className="text-xs font-bold uppercase text-gray-500">Artisan Authorized Signature</p>
                                </div>
                                <div className="text-center">
                                    <div className="border-b border-black mb-2 h-10"></div>
                                    <p className="text-xs font-bold uppercase text-gray-500">Supervisor Authorized Signature</p>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* --- KANBAN CARD PRINT OVERLAY --- */}
                {printingCard && (
                    <div className="print-wrapper fixed inset-0 z-[9999] min-h-screen overflow-y-auto bg-white py-4 flex flex-col items-center not-italic font-sans">
                        <div className="no-print bg-blue-100 text-blue-800 p-3 text-center text-sm font-bold mb-4 rounded-lg border border-blue-200 w-full max-w-[800px]">
                            💡 Hint: Print this page using your browser. Select A4 and disable margins for the best result.
                        </div>

                        {/* PRINT CONTAINER FOR A4 PAGE */}
                        <div className="w-full mx-auto bg-white text-black border-2 border-black flex flex-col" style={{ maxWidth: printingCard.width ? `${printingCard.width}px` : '800px' }}>
                            
                            {/* PART 1: BIN LABEL */}
                            <div className="w-full flex flex-col avoid-break border-b-2 border-black">
                                <div className="w-full border-b-2 border-black font-black text-sm uppercase text-center p-2" style={{ backgroundColor: printingCard.color || '#c2f0b9' }}>
                                    EXAMPLE KANBAN : {printingCard.title}
                                </div>
                                <div className="flex w-full">
                                    <div className="w-1/3 border-r-2 border-black flex flex-col p-3 items-center justify-center">
                                         <div className="w-full h-32 flex justify-center items-center">
                                             {printingCard.photo ? <img src={printingCard.photo} className="max-h-full max-w-full object-contain" /> : <div className="text-gray-400 font-bold text-xs uppercase text-center">No Image</div>}
                                         </div>
                                         <div className="w-full mt-3 border-2 border-black p-1 text-center font-black text-[10px] uppercase" style={{ backgroundColor: printingCard.color || '#d9ead3' }}>
                                             LOCATION: {printingCard.location}
                                         </div>
                                    </div>
                                    <div className="w-2/3">
                                         <table className="w-full text-xs font-black border-collapse h-full">
                                             <tbody>
                                                 <tr><td className="border-b-2 border-black p-3 w-1/3 border-r-2 bg-white">OUR PART NO.</td><td className="border-b-2 border-black p-3 bg-white">{printingCard.partNo}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-3 border-r-2 bg-white">SUPPLIER P/NO.</td><td className="border-b-2 border-black p-3 bg-white">{printingCard.supplierPartNo}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-3 border-r-2 bg-white">USED FOR</td><td className="border-b-2 border-black p-3 bg-white">{printingCard.usedFor}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-3 border-r-2 bg-white">SUPPLIER</td><td className="border-b-2 border-black p-3 bg-white">{printingCard.supplier}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-3 bg-[#fff2cc] border-r-2">ORDER WHEN</td><td className="border-b-2 border-black p-3 bg-[#fff2cc]">{printingCard.orderWhen}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-3 bg-[#fff2cc] border-r-2">ORDER QTY</td><td className="border-b-2 border-black p-3 bg-[#fff2cc] text-red-600 text-lg">{printingCard.orderQty}</td></tr>
                                                 <tr><td className="p-3 border-r-2 bg-white">DELIVERY TIME</td><td className="p-3 bg-white">{printingCard.deliveryTime}</td></tr>
                                             </tbody>
                                         </table>
                                    </div>
                                </div>
                            </div>

                            {/* CUT LINE */}
                            <div className="w-full border-b-2 border-black border-dashed flex justify-between items-center px-6 py-2 bg-gray-50 text-[10px] font-bold">
                                <span>✂️ CUT</span><span>✂️ CUT</span>
                            </div>

                            {/* PART 2: FRONT CARD */}
                            <div className="w-full flex flex-col avoid-break border-b-2 border-black">
                                <div className="w-full border-b-2 border-black font-black text-sm uppercase text-center p-2" style={{ backgroundColor: printingCard.color || '#c2f0b9' }}>
                                    EXAMPLE KANBAN : {printingCard.title}
                                </div>
                                <div className="flex w-full">
                                    <div className="w-1/3 border-r-2 border-black flex flex-col p-3 items-center justify-center">
                                         <div className="w-full h-32 flex justify-center items-center">
                                             {printingCard.photo ? <img src={printingCard.photo} className="max-h-full max-w-full object-contain" /> : <div className="text-gray-400 font-bold text-xs uppercase text-center">No Image</div>}
                                         </div>
                                         <div className="w-full mt-3 border-2 border-black p-1 text-center font-black text-[10px] uppercase" style={{ backgroundColor: printingCard.color || '#d9ead3' }}>
                                             LOCATION: {printingCard.location}
                                         </div>
                                    </div>
                                    <div className="w-2/3">
                                         <table className="w-full text-xs font-black border-collapse h-full">
                                             <tbody>
                                                 <tr><td className="border-b-2 border-black p-4 w-1/3 border-r-2 bg-white">SUPPLIER P/NO.</td><td className="border-b-2 border-black p-4 bg-white text-lg">{printingCard.supplierPartNo}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-4 border-r-2 bg-white">SUPPLIER</td><td className="border-b-2 border-black p-4 bg-white text-lg">{printingCard.supplier}</td></tr>
                                                 <tr><td className="border-b-2 border-black p-4 bg-[#fff2cc] border-r-2">ORDER QTY</td><td className="border-b-2 border-black p-4 bg-[#fff2cc] text-red-600 text-2xl">{printingCard.orderQty}</td></tr>
                                                 <tr><td className="p-4 border-r-2 bg-white">DELIVERY TIME</td><td className="p-4 bg-white text-lg">{printingCard.deliveryTime}</td></tr>
                                             </tbody>
                                         </table>
                                    </div>
                                </div>
                            </div>

                            {/* FOLD LINE */}
                            <div className="w-full border-b-2 border-black flex justify-center items-center py-2 bg-gray-200 text-xs font-black tracking-[0.3em]">
                                ⤻ FOLD HERE ⤻
                            </div>

                            {/* PART 3: BACK CARD (PULLED) */}
                            <div className="w-full flex avoid-break border-b-2 border-black">
                                <div className="w-1/2 border-r-2 border-black flex flex-col items-center justify-center p-8 bg-white">
                                     <h2 className="text-5xl font-black text-red-600 uppercase tracking-widest mb-2">PULLED</h2>
                                     <h2 className="text-3xl font-black text-red-600 uppercase tracking-widest">KANBAN</h2>
                                </div>
                                <div className="w-1/2 flex flex-col bg-white">
                                     <table className="w-full text-sm font-black border-b-2 border-black">
                                         <tbody>
                                             <tr><td className="border-b-2 border-black p-5 w-1/2 bg-[#fff2cc] border-r-2">ORDER QTY</td><td className="border-b-2 border-black p-5 bg-[#fff2cc] text-red-600 text-2xl text-center">{printingCard.orderQty}</td></tr>
                                             <tr><td className="p-5 border-r-2 bg-white">DELIVERY TIME</td><td className="p-5 bg-white text-lg text-center">{printingCard.deliveryTime}</td></tr>
                                         </tbody>
                                     </table>
                                     <div className="p-4 text-xs font-black uppercase bg-gray-50 flex-1 flex flex-col justify-center">
                                         <span className="text-gray-500 mb-1">CONTACT DETAILS / NOTES:</span>
                                         <span className="text-sm">{printingCard.contactDetails || 'NA'}</span>
                                     </div>
                                </div>
                            </div>

                            {/* CUT LINE */}
                            <div className="w-full border-b-2 border-black border-dashed flex justify-between items-center px-6 py-2 bg-gray-50 text-[10px] font-bold">
                                <span>✂️ CUT</span><span>✂️ CUT</span>
                            </div>

                            {/* PART 4: QR CODE REORDER */}
                            <div className="w-full flex avoid-break bg-white">
                                <div className="w-1/2 border-r-2 border-black p-8 flex flex-col justify-center" style={{ backgroundColor: printingCard.color || '#c2f0b9' }}>
                                    <h3 className="font-black uppercase text-3xl mb-2">{printingCard.title}</h3>
                                    <p className="text-lg font-bold uppercase mb-1">Supplier: {printingCard.supplier}</p>
                                    <p className="text-lg font-bold uppercase text-red-600">Reorder Qty: {printingCard.orderQty}</p>
                                </div>
                                <div className="w-1/2 p-8 flex flex-col items-center justify-center">
                                    <p className="text-sm font-black uppercase mb-3 tracking-widest text-center">Scan to Reorder</p>
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`REORDER KANBAN\nItem: ${printingCard.title}\nSupplier P/N: ${printingCard.supplierPartNo}\nOrder Qty: ${printingCard.orderQty}`)}`} alt="QR Code" className="w-32 h-32 object-contain" />
                                </div>
                            </div>

                        </div>
                    </div>
                )}
                </Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TimberSmithApp />);
    </script>
</body>
</html>
