                                                            <p className={`text-xl font-black italic ${adv.paidInFull ? 'text-emerald-500' : 'text-red-500'}`}>R {adv.amount.toLocaleString()}</p>
                                                            <p className="text-[10px] text-white font-bold uppercase mt-1">Reason: <span className="text-gray-400">{adv.reason}</span></p>
                                                            <p className="text-[9px] text-gray-500 font-black uppercase mt-1 tracking-widest">Date: {adv.date} | Terms: {adv.months} Month(s) | Method: {adv.method}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right flex flex-col gap-2">
                                                        {adv.paidInFull ? (
                                                            <span className="px-4 py-2 bg-emerald-500/20 text-emerald-500 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2"><Icon name="check-circle" size={14}/> Settled</span>
                                                        ) : (
                                                            <button type="button" onClick={() => markAdvancePaid(detailsEmp, adv.id)} className="px-4 py-3 bg-white/10 hover:bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Mark Paid In Full</button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. TIME OFF HR LOGS (Supervisor Hub) */}
                        {appMode === 'hr' && !isLocked && (
                            <div className="animate-in duration-500">
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden mb-8">
                                    <div className="p-8 border-b border-white/5 bg-black/20 flex justify-between items-center text-white italic">
                                        <h2 className="text-2xl font-black uppercase tracking-tighter">Active Time Off Logs</h2>
                                        <div className="p-3 bg-purple-500/10 text-purple-500 rounded-2xl"><Icon name="plane-takeoff" size={24}/></div>
                                    </div>
                                    <div className="p-8 space-y-6">
                                        {employees.filter(e => e.status === 'Break').length === 0 && (
                                            <p className="text-gray-600 font-black uppercase text-xs tracking-widest text-center py-8 italic">No artisans currently on mid-shift time off.</p>
                                        )}
                                        {employees.filter(e => e.status === 'Break').map(emp => (
                                            <div key={emp.id} className="bg-purple-900/10 p-6 rounded-3xl border border-purple-500/20 flex justify-between items-center">
                                                <div className="flex items-center space-x-4">
                                                    <PhotoAvatar emp={emp} size={50} />
                                                    <div>
                                                        <p className="font-black text-sm uppercase text-white italic">{emp.name} {emp.surname}</p>
                                                        <p className="text-[10px] text-purple-400 font-black uppercase mt-1 tracking-widest italic">Reason: {emp.currentBreakReason || 'Not Specified'}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[9px] font-black uppercase text-gray-500 tracking-widest mb-1 italic">Left At</p>
                                                    <span className="px-4 py-2 bg-purple-500/20 text-purple-400 font-black text-[10px] rounded-full uppercase tracking-widest italic">{emp.lastClock}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden">
                                    <div className="p-8 border-b border-white/5 bg-black/20 text-white italic">
                                        <h2 className="text-xl font-black uppercase tracking-tighter text-gray-500">Standard Leave Balances</h2>
                                    </div>
                                    <div className="p-8 space-y-4">
                                        {employees.filter(e => !e.isArchived).map(emp => (
                                            <div key={emp.id} className="bg-black/40 p-4 rounded-3xl border border-white/5 flex justify-between items-center">
                                                <div className="flex items-center space-x-4">
                                                    <PhotoAvatar emp={emp} size={40} />
                                                    <p className="font-black text-sm uppercase text-white italic">{emp.name} {emp.surname}</p>
                                                </div>
                                                <span className="text-gray-500 font-black text-[10px] uppercase tracking-widest italic">15 Days Available</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PAYROLL & ADVANCES (Supervisor Hub) */}
                        {appMode === 'payroll' && !isLocked && (
                            <div className="animate-in duration-500">
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden mb-8">
                                    <div className="p-8 border-b border-white/5 bg-black/20 flex justify-between items-center text-white italic">
                                        <h2 className="text-2xl font-black uppercase tracking-tighter">Payroll & Money Borrowed</h2>
                                        <div className="p-3 bg-amber-500/10 text-amber-500 rounded-2xl"><Icon name="banknote" size={24}/></div>
                                    </div>
                                    <div className="p-8 space-y-6">
                                        {employees.filter(e => !e.isArchived).map(emp => {
                                            const unpaidAdvances = (emp.advances || []).filter(a => !a.paidInFull);
                                            const totalOwed = unpaidAdvances.reduce((sum, adv) => sum + adv.amount, 0);
                                            const periodDeduction = unpaidAdvances.reduce((sum, adv) => sum + (adv.amount / adv.months), 0);
                                            
                                            const rate = parseFloat(emp.hourlyRate) || 0;
                                            const hrs = emp.weeklyHours || 0;
                                            const gross = rate * hrs;
                                            const net = gross - periodDeduction;
                                            return (
                                                <div key={emp.id} className="bg-black/40 p-6 rounded-3xl border border-white/5 flex justify-between items-center">
                                                    <div className="flex items-center space-x-4">
                                                        <PhotoAvatar emp={emp} size={50} />
                                                        <div>
                                                            <p className="font-black text-sm uppercase text-white italic">{emp.name} {emp.surname}</p>
                                                            <p className="text-[10px] text-gray-500 font-black uppercase mt-1 tracking-widest italic">Rate: R{rate}/hr | Week: {hrs.toFixed(1)}h</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[9px] font-black uppercase text-gray-500 tracking-widest mb-1 italic">Gross: R {gross.toLocaleString()}</p>
                                                        {periodDeduction > 0 && <p className="text-[9px] font-black uppercase text-red-500 tracking-widest mb-1 italic">Term Deduction: -R {periodDeduction.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>}
                                                        <p className="text-lg font-black text-emerald-500 italic mt-1">Net: R {net.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                                                        {totalOwed > 0 && <p className="text-[8px] font-black uppercase text-gray-600 tracking-widest mt-2 italic">Total Outstanding: R {totalOwed.toLocaleString()}</p>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4B. MOBILE DEPLOYMENT HUB (QR CODE) */}
                        {appMode === 'mobile' && !isLocked && (
                            <div className="animate-in slide-in-from-right-10 duration-500 max-w-4xl mx-auto">
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden p-10 text-center">
                                    <div className="flex flex-col items-center justify-center space-y-6">
                                        <div className="p-5 bg-pink-500/10 text-pink-500 rounded-3xl animate-bounce"><Icon name="smartphone" size={48} /></div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-tighter text-white">Mobile Deployment Hub</h2>
                                        <p className="text-sm text-gray-400 max-w-xl mx-auto italic">
                                            Deploy the TimberSmith Artisan App directly to carpenters' and workers' smartphones. Let them track hours, request advances, and view shifts on the move.
                                        </p>

                                        <div className="my-8 bg-white p-6 rounded-[2.5rem] inline-block shadow-2xl border-4 border-[#ff8c00]/20">
                                            <img 
                                                src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(APP_MOBILE_LINK)}`} 
                                                alt="Scan to Install App" 
                                                className="w-48 h-48 md:w-56 md:h-56 object-contain"
                                                onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/250x250?text=Scan+QR+Code"; }}
                                            />
                                        </div>

                                        <div className="flex flex-col items-center space-y-3 w-full max-w-md">
                                            <p className="text-xs font-bold text-gray-500 uppercase tracking-widest">Or share the direct installation URL</p>
                                            <div className="flex w-full bg-black/40 rounded-2xl border border-white/5 overflow-hidden">
                                                <input 
                                                    type="text" 
                                                    readOnly 
                                                    value={APP_MOBILE_LINK} 
                                                    className="flex-1 bg-transparent px-4 py-3 text-xs font-mono text-gray-300 outline-none"
                                                />
                                                <button 
                                                    type="button"
                                                    onClick={() => {
                                                        const el = document.createElement('textarea');
                                                        el.value = APP_MOBILE_LINK;
                                                        document.body.appendChild(el);
                                                        el.select();
                                                        document.execCommand('copy');
                                                        document.body.removeChild(el);
                                                        announce("Link copied to clipboard");
                                                    }}
                                                    className="bg-pink-600 hover:bg-pink-500 text-white px-5 py-3 font-black text-xs uppercase tracking-wider transition-colors"
                                                >
                                                    Copy Link
                                                </button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full pt-10 border-t border-white/5 mt-10 text-left">
                                            <div className="bg-black/30 p-6 rounded-3xl border border-white/5">
                                                <span className="text-pink-500 font-mono font-black text-lg">01</span>
                                                <h4 className="font-black uppercase text-sm mt-2 text-white italic">Scan QR Code</h4>
                                                <p className="text-xs text-gray-500 mt-2 leading-relaxed">Open the native camera app on Android or iOS and point it at the QR code above.</p>
                                            </div>
                                            <div className="bg-black/30 p-6 rounded-3xl border border-white/5">
                                                <span className="text-pink-500 font-mono font-black text-lg">02</span>
                                                <h4 className="font-black uppercase text-sm mt-2 text-white italic">Install as App</h4>
                                                <p className="text-xs text-gray-500 mt-2 leading-relaxed">Tap "Add to Home Screen" or install when prompted by Chrome/Safari to save it as a native app.</p>
                                            </div>
                                            <div className="bg-black/30 p-6 rounded-3xl border border-white/5">
                                                <span className="text-pink-500 font-mono font-black text-lg">03</span>
                                                <h4 className="font-black uppercase text-sm mt-2 text-white italic">Sync Terminal</h4>
                                                <p className="text-xs text-gray-500 mt-2 leading-relaxed">Open the app on your phone and input your workshop artisan terminal code to sync database records.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 5. EMPLOYEE PRIVATE HUB */}
                        {view === 'emp_home' && selectedEmployee && (
                           <div className="max-w-5xl mx-auto p-12 bg-[#1a1a1a] rounded-[5rem] border border-white/5 shadow-2xl animate-in slide-in-from-bottom-20 duration-500 font-sans">
                               <div className="flex items-center gap-10 mb-16">
                                   <PhotoAvatar emp={selectedEmployee} size={160} className="border-4 border-[#ff8c00] shadow-2xl shadow-black/80" />
                                   <div className="flex-1">
                                       <h2 className="text-6xl font-black uppercase italic tracking-tighter leading-none italic text-white italic">{selectedEmployee.name} {selectedEmployee.surname}</h2>
                                       <p className="text-2xl font-black text-gray-500 uppercase tracking-[0.4em] mt-4 italic">{selectedEmployee.role}</p>
                                   </div>
                                   <button type="button" onClick={() => setView('dashboard')} className="p-6 bg-white/5 rounded-full text-gray-500 hover:text-white transition-all active:scale-90"><Icon name="x" size={40}/></button>
                               </div>
                               <div className="grid grid-cols-1 md:grid-cols-4 gap-10">
                                   <button type="button" onClick={() => { setView('scanning'); setPendingAction('normal'); }} className="bg-black/60 p-10 rounded-[4rem] flex flex-col items-center justify-center gap-6 border-2 border-transparent hover:border-[#ff8c00] transition-all group active:scale-95 shadow-xl">
                                       <div className="p-8 bg-[#ff8c00]/10 text-[#ff8c00] rounded-[2.5rem] transition-transform group-hover:scale-110"><Icon name="clock" size={60} /></div>
                                       <span className="font-black uppercase italic text-xl tracking-widest text-white italic">Clocking</span>
                                   </button>
                                   <button type="button" onClick={() => { setView('emp_time_off'); setTimeOffReason(''); setPendingAction('normal'); }} className="bg-black/60 p-10 rounded-[4rem] flex flex-col items-center justify-center gap-6 border-2 border-transparent hover:border-purple-500 transition-all group active:scale-95 shadow-xl">
                                       <div className="p-8 bg-purple-500/10 text-purple-400 rounded-[2.5rem] transition-transform group-hover:scale-110"><Icon name="plane-takeoff" size={60} /></div>
                                       <span className="font-black uppercase italic text-xl tracking-widest text-white italic">Time Off</span>
                                   </button>
                                   <button type="button" onClick={() => { setView('emp_money_borrowed'); setBorrowAmount(''); setBorrowReason(''); setBorrowMethod(''); setBorrowMonths('1'); setCapturedBorrowPhoto(null); setPendingAction('normal'); }} className="bg-black/60 p-10 rounded-[4rem] flex flex-col items-center justify-center gap-6 border-2 border-transparent hover:border-emerald-500 transition-all group active:scale-95 shadow-xl">
                                       <div className="p-8 bg-emerald-500/10 text-emerald-400 rounded-[2.5rem] transition-transform group-hover:scale-110"><Icon name="banknote" size={60} /></div>
                                       <span className="font-black uppercase italic text-xl tracking-widest text-white italic text-center">Money<br/>Borrowed</span>
                                   </button>
                                   <button type="button" onClick={() => { setPendingAction('archive'); setView('supervisor_approval'); }} className="bg-black/60 p-10 rounded-[4rem] flex flex-col items-center justify-center gap-6 border-2 border-transparent hover:border-red-500 transition-all group active:scale-95 shadow-xl">
                                       <div className="p-8 bg-red-500/10 text-red-400 rounded-[2.5rem] transition-transform group-hover:scale-110"><Icon name="archive" size={60} /></div>
                                       <span className="font-black uppercase italic text-xl tracking-widest text-white italic text-center">Archive<br/>Profile</span>
                                   </button>
                               </div>
                           </div>
                        )}

                        {/* 6. EMPLOYEE TIME OFF INPUT INTERFACE */}
                        {view === 'emp_time_off' && selectedEmployee && (
                            <div className="fixed inset-0 z-[150] bg-black/95 flex flex-col items-center justify-center p-6 animate-in slide-in-from-bottom-20">
                                <div className="w-full max-w-2xl bg-[#1a1a1a] p-10 rounded-[4rem] border border-white/10 shadow-2xl relative">
                                    <button type="button" onClick={() => setView('emp_home')} className="absolute top-8 right-8 p-3 bg-white/5 rounded-full text-gray-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                    
                                    <div className="flex items-center gap-6 mb-8">
                                        <div className="p-5 bg-purple-500/10 text-purple-400 rounded-3xl"><Icon name="plane-takeoff" size={40} /></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase italic tracking-tighter text-white leading-none">Time Off Request</h2>
                                            <p className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mt-2">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                        </div>
                                    </div>

                                    {selectedEmployee.status === 'In' ? (
                                        <div className="bg-black/40 p-6 rounded-[2rem] border border-white/5 mb-8">
                                            <label className="block text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest ml-2">Reason (Required for leaving)</label>
                                            <textarea 
                                                value={timeOffReason} 
                                                onChange={e => setTimeOffReason(e.target.value)}
                                                placeholder="E.g., Going to the bank, Lunch break, Doctor..."
                                                className="w-full bg-black border border-white/10 rounded-2xl p-5 text-white font-bold outline-none focus:border-purple-500 transition-all resize-none"
                                                rows="2"
                                            />
                                        </div>
                                    ) : (
                                        <div className="bg-purple-900/10 p-6 rounded-[2rem] border border-purple-500/20 mb-8 text-center">
                                            <p className="text-sm font-black text-purple-400 uppercase tracking-widest mb-2">You are currently on Time Off</p>
                                            <p className="text-xs text-gray-400 font-bold italic">Click the button below to resume your standard workshop shift.</p>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-6">
                                        <button 
                                            type="button"
                                            onClick={() => { setPendingAction('time_off_out'); setView('personal_pin_entry'); }}
                                            disabled={selectedEmployee.status !== 'In' || !timeOffReason.trim()}
                                            className={`p-6 rounded-[2rem] font-black uppercase tracking-widest text-sm flex flex-col items-center gap-3 transition-all ${selectedEmployee.status === 'In' && timeOffReason.trim() ? 'bg-purple-600 hover:bg-purple-500 text-white shadow-xl' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}
                                        >
                                            <Icon name="arrow-right" size={24} />
                                            Start Time Off
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => { setPendingAction('time_off_in'); setView('personal_pin_entry'); }}
                                            disabled={selectedEmployee.status === 'In'}
                                            className={`p-6 rounded-[2rem] font-black uppercase tracking-widest text-sm flex flex-col items-center gap-3 transition-all ${selectedEmployee.status !== 'In' ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-xl' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}
                                        >
                                            <Icon name="hard-hat" size={24} />
                                            Return to Work
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 6B. EMPLOYEE MONEY BORROWED INTERFACE */}
                        {view === 'emp_money_borrowed' && selectedEmployee && (
                            <div className="fixed inset-0 z-[150] bg-black/95 flex flex-col items-center justify-center p-6 animate-in slide-in-from-bottom-20">
                                <div className="w-full max-w-2xl bg-[#1a1a1a] p-10 rounded-[4rem] border border-white/10 shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                                    <button type="button" onClick={() => setView('emp_home')} className="absolute top-8 right-8 p-3 bg-white/5 rounded-full text-gray-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                    
                                    <div className="flex items-center gap-6 mb-8 mt-2">
                                        <div className="p-5 bg-emerald-500/10 text-emerald-400 rounded-3xl"><Icon name="banknote" size={40} /></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase italic tracking-tighter text-white leading-none">Money Borrowed</h2>
                                            <p className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mt-2">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                        </div>
                                    </div>

                                    <div className="bg-black/40 p-6 rounded-[2rem] border border-white/5 mb-8 space-y-6">
                                        <div className="flex gap-6">
                                            {/* Face Capture Section */}
                                            <div className="w-1/3 flex flex-col gap-3">
                                                <div className="aspect-square bg-black rounded-3xl border-2 border-white/10 overflow-hidden relative">
                                                    {isBorrowCapturing ? <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover scale-x-[-1]" /> : capturedBorrowPhoto ? <img src={capturedBorrowPhoto} className="w-full h-full object-cover" /> : <div className="h-full flex flex-col items-center justify-center text-gray-600"><Icon name="camera" size={32} /><p className="mt-2 font-black text-[8px] uppercase tracking-widest text-center italic">Face Scan<br/>Required</p></div>}
                                                </div>
                                                {!capturedBorrowPhoto && !isBorrowCapturing && (
                                                    <button type="button" onClick={() => { setIsBorrowCapturing(true); if(videoRef.current) navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => { streamRef.current = s; videoRef.current.srcObject = s; }); }} className="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl font-black uppercase text-[10px] tracking-widest text-white transition-all italic">Start Camera</button>
                                                )}
                                                {isBorrowCapturing && (
                                                    <button type="button" onClick={() => {
                                                        const canvas = canvasRef.current; const video = videoRef.current;
                                                        canvas.width = 320; canvas.height = 240;
                                                        canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                                                        setCapturedBorrowPhoto(canvas.toDataURL('image/jpeg', 0.6)); setIsBorrowCapturing(false);
                                                        if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
                                                    }} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-black uppercase text-[10px] tracking-widest text-white shadow-xl transition-all italic">Capture</button>
                                                )}
                                                {capturedBorrowPhoto && (
                                                    <button type="button" onClick={() => { setCapturedBorrowPhoto(null); setIsBorrowCapturing(true); if(videoRef.current) navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => { streamRef.current = s; videoRef.current.srcObject = s; }); }} className="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl font-black uppercase text-[10px] tracking-widest text-white transition-all italic">Retake</button>
                                                )}
                                            </div>
                                            
                                            {/* Inputs Section */}
                                            <div className="w-2/3 space-y-4 flex flex-col justify-center">
                                                <div>
                                                    <label className="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest ml-2 italic">Amount Request (R)</label>
                                                    <input 
                                                        type="number"
                                                        value={borrowAmount} 
                                                        onChange={e => setBorrowAmount(e.target.value)}
                                                        placeholder="0.00"
                                                        className="w-full bg-black border border-white/10 rounded-2xl p-4 text-emerald-500 text-xl font-black outline-none focus:border-emerald-500 transition-all italic"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest ml-2 italic">Reason</label>
                                                    <input 
                                                        type="text"
                                                        value={borrowReason} 
                                                        onChange={e => setBorrowReason(e.target.value)}
                                                        placeholder="E.g., Transport..."
                                                        className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white font-bold outline-none focus:border-emerald-500 transition-all italic"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* Dropdown Section */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest ml-2 italic">Method of Payment</label>
                                                <select 
                                                    value={borrowMethod} 
                                                    onChange={e => setBorrowMethod(e.target.value)}
                                                    className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white font-bold outline-none focus:border-emerald-500 transition-all appearance-none cursor-pointer italic"
                                                >
                                                    <option value="" disabled>Select Method...</option>
                                                    <option value="EFT">EFT</option>
                                                    <option value="Cash">Cash</option>
                                                    <option value="Immediate Payment">Immediate Payment</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest ml-2 italic">Repayment Terms</label>
                                                <select 
                                                    value={borrowMonths} 
                                                    onChange={e => setBorrowMonths(e.target.value)}
                                                    className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white font-bold outline-none focus:border-emerald-500 transition-all appearance-none cursor-pointer italic"
                                                >
                                                    <option value="1">1 Month</option>
                                                    <option value="2">2 Months</option>
                                                    <option value="3">3 Months</option>
                                                    <option value="4">4 Months</option>
                                                    <option value="5">5 Months</option>
                                                    <option value="6">6 Months</option>
                                                </select>
                                            </div>
                                        </div>

                                        {borrowMethod === 'Immediate Payment' && (
                                            <div className="bg-red-500/10 border border-red-500/50 rounded-2xl p-4 flex items-center gap-4 animate-in zoom-in-95">
                                                <div className="p-2 bg-red-500/20 rounded-full text-red-500"><Icon name="shield-alert" size={20} /></div>
                                                <p className="text-red-500 text-[11px] font-black uppercase tracking-widest leading-relaxed italic">Additional charges of R75 will be charged for immediate payments.</p>
                                            </div>
                                        )}
                                    </div>

                                    <button 
                                        type="button"
                                        onClick={() => { setPendingAction('borrow_money'); setView('supervisor_approval'); }}
                                        disabled={!borrowAmount || borrowAmount <= 0 || !borrowReason.trim() || !borrowMethod || !capturedBorrowPhoto}
                                        className={`w-full p-6 rounded-[2rem] font-black uppercase tracking-widest text-sm flex items-center justify-center gap-3 transition-all italic ${borrowAmount > 0 && borrowReason.trim() && borrowMethod && capturedBorrowPhoto ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-xl' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}
                                    >
                                        Proceed to Validation
                                        <Icon name="arrow-right" size={24} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 6C. EMPLOYEE ARCHIVE REASON INTERFACE */}
                        {view === 'emp_archive_reason' && selectedEmployee && (
                            <div className="fixed inset-0 z-[150] bg-black/95 flex flex-col items-center justify-center p-6 animate-in slide-in-from-bottom-20">
                                <div className="w-full max-w-2xl bg-[#1a1a1a] p-10 rounded-[4rem] border border-red-500/30 shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                                    <button type="button" onClick={() => setView('emp_home')} className="absolute top-8 right-8 p-3 bg-white/5 rounded-full text-gray-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                    
                                    <div className="flex items-center gap-6 mb-8 mt-2">
                                        <div className="p-5 bg-red-500/10 text-red-400 rounded-3xl"><Icon name="archive" size={40} /></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase italic tracking-tighter text-white leading-none">Archive Employee</h2>
                                            <p className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mt-2">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                        </div>
                                    </div>

                                    <div className="bg-black/40 p-6 rounded-[2rem] border border-white/5 mb-8 space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest ml-2 italic">Reason for Leaving</label>
                                            <select 
                                                value={archiveReason} 
                                                onChange={e => setArchiveReason(e.target.value)}
                                                className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white font-bold outline-none focus:border-red-500 transition-all appearance-none cursor-pointer italic"
                                            >
                                                <option value="" disabled>Select Reason...</option>
                                                <option value="Fired">Fired</option>
                                                <option value="Deceased">Deceased</option>
                                                <option value="Layed off">Layed off</option>
                                                <option value="Quit">Quit</option>
                                            </select>
                                        </div>
                                    </div>

                                    <button 
                                        type="button"
                                        onClick={() => processArchive(selectedEmployee)}
                                        disabled={!archiveReason}
                                        className={`w-full p-6 rounded-[2rem] font-black uppercase tracking-widest text-sm flex items-center justify-center gap-3 transition-all italic ${archiveReason ? 'bg-red-600 hover:bg-red-500 text-white shadow-xl' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}
                                    >
                                        Confirm Archive
                                        <Icon name="arrow-right" size={24} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 7. AUTO SCANNER & SECURITY (Taskbar Hidden) */}
                        {view === 'scanning' && selectedEmployee && (
                           <div className="fixed inset-0 z-[150] bg-black/98 flex flex-col items-center justify-center p-12 animate-in zoom-in">
                               <div className="w-full max-w-2xl aspect-square relative rounded-[5rem] overflow-hidden border-[20px] border-[#222] shadow-[0_0_150px_rgba(255,140,0,0.15)]">
                                   <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover grayscale opacity-100 contrast-125 scale-x-[-1]" />
                                   <div className="absolute inset-0 flex flex-col items-center justify-center p-10">
                                       <div className={`w-3/4 aspect-square border-4 rounded-[5rem] transition-all duration-700 ${scanComplete ? 'border-emerald-500 scale-105 shadow-[0_0_100px_rgba(16,185,129,0.3)]' : 'border-[#ff8c00] animate-pulse'}`}>
                                           <div className="absolute inset-0 opacity-10 flex items-center justify-center"><Icon name="fingerprint" size={200}/></div>
                                           {!scanComplete && <div className="absolute w-full h-2 bg-[#ff8c00] top-0 animate-[scan_2s_linear_infinite] shadow-[0_0_50px_#ff8c00]" />}
                                       </div>
                                   </div>
                               </div>
                               <h3 className="mt-12 text-[#ff8c00] font-black uppercase text-2xl tracking-[0.8em] animate-pulse italic text-center italic italic">Scanning identity: {selectedEmployee.name}</h3>
                               <button type="button" onClick={() => setView('emp_home')} className="mt-8 text-gray-600 font-black uppercase text-xs hover:text-white transition-colors italic underline underline-offset-8">Abort Sequence</button>
                           </div>
                        )}

                        {/* VIEW: PERSONAL PIN ENTRY */}
                        {view === 'personal_pin_entry' && selectedEmployee && (
                           <div className="fixed inset-0 z-[200] bg-[#0c0c0c] flex flex-col items-center justify-center animate-in slide-in-from-bottom-20">
                               <div className="bg-[#151515] p-12 rounded-[5rem] border border-white/10 text-center w-full max-w-sm shadow-[0_50px_100px_rgba(0,0,0,0.8)]">
                                   <div className={`p-6 rounded-full mb-8 mx-auto w-fit ${personalPinError ? 'bg-red-500/20 text-red-500 animate-shake' : pendingAction.includes('time_off') ? 'bg-purple-500/10 text-purple-500 shadow-xl shadow-purple-500/10' : pendingAction === 'borrow_money' ? 'bg-emerald-500/10 text-emerald-500 shadow-xl shadow-emerald-500/10' : pendingAction === 'archive' ? 'bg-red-500/10 text-red-500 shadow-xl shadow-red-500/10' : 'bg-blue-500/10 text-blue-500 shadow-xl shadow-blue-500/10'}`}>
                                       <Icon name={pendingAction === 'archive' ? 'archive' : 'key-round'} size={60} />
                                   </div>
                                   <h2 className="text-2xl font-black uppercase italic tracking-tighter mb-1 text-white italic text-center">Authorization Check</h2>
                                   <p className="text-gray-500 text-[11px] font-black uppercase mb-12 tracking-widest italic">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                   <div className="flex justify-center space-x-6 mb-16">
                                       {[1,2,3,4].map(i => <div key={i} className={`h-4 w-4 rounded-full transition-all duration-300 ${personalPinInput.length >= i ? (personalPinError ? 'bg-red-500' : pendingAction.includes('time_off') ? 'bg-purple-500 shadow-[0_0_20px_#a855f7]' : pendingAction === 'borrow_money' ? 'bg-emerald-500 shadow-[0_0_20px_#10b981]' : pendingAction === 'archive' ? 'bg-red-500 shadow-[0_0_20px_#ef4444]' : 'bg-blue-500 shadow-[0_0_20px_#3b82f6]') : 'bg-white/5'}`} />)}
                                   </div>
                                   <div className="grid grid-cols-3 gap-4 mb-4">
                                       {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'C', 0, 'X'].map(n => (
                                           <button type="button" key={n} onClick={() => {
                                               if (n === 'X') {
                                                   setView('dashboard');
                                                   setSelectedEmployee(null);
                                                   setPendingAction('normal');
                                                   setPersonalPinInput('');
                                               } else if (n === 'C') {
                                                   setPersonalPinInput('');
                                               } else {
                                                   handlePersonalPinDigit(n.toString());
                                               }
                                           }} className={`h-16 bg-white/5 rounded-2xl flex items-center justify-center text-2xl font-black text-white transition-all active:bg-blue-600`}>{n}</button>
                                       ))}
                                   </div>
                                   <button type="button" onClick={submitPersonalPin} disabled={personalPinInput.length !== 4} className={`w-full h-16 rounded-2xl flex items-center justify-center text-2xl font-black transition-all ${personalPinInput.length === 4 ? (pendingAction.includes('time_off') ? 'bg-purple-600 text-white shadow-xl' : pendingAction === 'borrow_money' ? 'bg-emerald-600 text-white shadow-xl' : pendingAction === 'archive' ? 'bg-red-600 text-white shadow-xl' : 'bg-blue-600 text-white shadow-xl') : 'bg-white/5 text-gray-600'}`}>OK</button>
                               </div>
                           </div>
                        )}

                        {/* VIEW: SUPERVISOR APPROVAL FOR TIME OFF, ADVANCES & ARCHIVE */}
                        {view === 'supervisor_approval' && selectedEmployee && (
                           <div className="fixed inset-0 z-[200] bg-[#0c0c0c] flex flex-col items-center justify-center animate-in slide-in-from-bottom-20 italic">
                               <div className={`bg-[#151515] p-12 rounded-[5rem] border ${pendingAction === 'borrow_money' ? 'border-emerald-500/30' : pendingAction === 'archive' ? 'border-red-500/30' : 'border-purple-500/30'} text-center w-full max-w-sm shadow-[0_50px_100px_rgba(0,0,0,0.8)]`}>
                                   <div className={`p-6 rounded-full mb-8 mx-auto w-fit italic ${supervisorApprovalPinError ? 'bg-red-500/20 text-red-500 animate-shake' : pendingAction === 'borrow_money' ? 'bg-emerald-500/10 text-emerald-500 shadow-xl shadow-emerald-500/10' : pendingAction === 'archive' ? 'bg-red-500/10 text-red-500 shadow-xl shadow-red-500/10' : 'bg-purple-500/10 text-purple-500 shadow-xl shadow-purple-500/10'}`}>
                                       <Icon name="lock" size={60} />
                                   </div>
                                   <h2 className="text-2xl font-black uppercase italic tracking-tighter mb-1 text-white italic text-center">Supervisor Approval</h2>
                                   <p className="text-gray-500 text-[11px] font-black uppercase mb-12 tracking-widest italic">{pendingAction === 'borrow_money' ? 'Money Borrowed:' : pendingAction === 'archive' ? 'Archive Profile:' : 'Time Off:'} {selectedEmployee.name} {selectedEmployee.surname}</p>
                                   <div className="flex justify-center space-x-6 mb-16">
                                       {[1,2,3,4].map(i => <div key={i} className={`h-4 w-4 rounded-full transition-all duration-300 ${supervisorApprovalPinInput.length >= i ? (supervisorApprovalPinError ? 'bg-red-500' : pendingAction === 'borrow_money' ? 'bg-emerald-500 shadow-[0_0_20px_#10b981]' : pendingAction === 'archive' ? 'bg-red-500 shadow-[0_0_20px_#ef4444]' : 'bg-purple-500 shadow-[0_0_20px_#a855f7]') : 'bg-white/5'}`} />)}
                                   </div>
                                   <div className="grid grid-cols-3 gap-4 mb-4">
                                       {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'C', 0, 'X'].map(n => (
                                           <button type="button" key={n} onClick={() => {
                                               if (n === 'X') {
                                                   setView(pendingAction === 'borrow_money' ? 'emp_money_borrowed' : pendingAction === 'archive' ? 'emp_home' : 'emp_time_off');
                                                   setSupervisorApprovalPinInput('');
                                               } else if (n === 'C') {
                                                   setSupervisorApprovalPinInput('');
                                               } else {
                                                   handleSupervisorApprovalDigit(n.toString());
                                               }
                                           }} className={`h-16 bg-white/5 rounded-2xl flex items-center justify-center text-2xl font-black text-white transition-all ${pendingAction === 'borrow_money' ? 'active:bg-emerald-600' : pendingAction === 'archive' ? 'active:bg-red-600' : 'active:bg-purple-600'}`}>{n}</button>
                                       ))}
                                   </div>
                                   <button type="button" onClick={submitSupervisorPin} disabled={supervisorApprovalPinInput.length !== 4} className={`w-full h-16 rounded-2xl flex items-center justify-center text-2xl font-black transition-all ${supervisorApprovalPinInput.length === 4 ? (pendingAction === 'borrow_money' ? 'bg-emerald-600 text-white shadow-xl' : pendingAction === 'archive' ? 'bg-red-600 text-white shadow-xl' : 'bg-purple-600 text-white shadow-xl') : 'bg-white/5 text-gray-600'}`}>OK</button>
                               </div>
                           </div>
                        )}

                        {/* VIEW: SUCCESS SCREEN */}
                        {view === 'success_screen' && selectedEmployee && (
                             <div className="fixed inset-0 z-[500] bg-black/95 flex flex-col items-center justify-center p-12 text-center animate-in fade-in">
                                <div className={`w-64 h-64 rounded-full border-[15px] p-2 shadow-2xl mb-12 overflow-hidden ${lastClockResult === 'In' ? 'border-emerald-500 shadow-emerald-500/30' : lastClockResult === 'HR_Request' ? 'border-emerald-500 shadow-emerald-500/30' : lastClockResult === 'Break' ? 'border-purple-500 shadow-purple-500/30' : 'border-red-500 shadow-red-500/30'}`}>
                                    <PhotoAvatar emp={selectedEmployee} size="100%" className="border-0 rounded-full shadow-none shadow-inner" />
                                </div>
                                <h2 className="text-6xl md:text-8xl font-black italic uppercase tracking-tighter text-white mb-4 leading-none italic text-center">
                                    {lastClockResult === 'HR_Request' ? 'SENT TO HR' : lastClockResult === 'Archive' ? 'PROFILE ARCHIVED' : 'IDENTITY VERIFIED'}
                                </h2>
                                {lastClockResult === 'HR_Request' && <p className="text-emerald-500 font-bold uppercase tracking-widest text-xl mb-6">Your request has been send through to HR.</p>}
                                <p className="text-3xl font-black text-gray-500 uppercase tracking-widest mb-16 italic">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                
                                <button 
                                    onClick={() => {
                                        setView('dashboard'); 
                                        setSelectedEmployee(null); 
                                        setScanComplete(false); 
                                        setPendingAction('normal'); 
                                        setTimeOffReason('');
                                        setLastClockResult(null); 
                                    }}
                                    className={`bg-[#151515] w-full max-w-md p-14 rounded-[5rem] text-center border-b-[16px] shadow-2xl active:scale-95 transition-all ${lastClockResult === 'In' || lastClockResult === 'HR_Request' ? 'border-emerald-500 hover:bg-emerald-900/20' : lastClockResult === 'Break' ? 'border-purple-500 hover:bg-purple-900/20' : 'border-red-500 hover:bg-red-900/20'}`}
                                >
                                   <p className={`font-mono font-black italic uppercase leading-none tracking-tighter ${lastClockResult === 'HR_Request' ? 'text-4xl md:text-5xl' : 'text-6xl md:text-8xl'} ${lastClockResult === 'In' || lastClockResult === 'HR_Request' ? 'text-emerald-500' : lastClockResult === 'Break' ? 'text-purple-500' : 'text-red-500'}`}>
                                       {lastClockResult === 'In' ? 'IN' : lastClockResult === 'Break' ? 'TIME OFF' : lastClockResult === 'HR_Request' ? 'RETURN TO HOME' : lastClockResult === 'Archive' ? 'ARCHIVED' : 'OUT'}
                                   </p>
                                </button>
                             </div>
                        )}
                    </main>

                    {/* ENROLLMENT MODAL (Includes UIF, Tax, Contact) */}
                    {showEnrollModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/90 backdrop-blur-3xl flex items-center justify-center p-8 animate-in fade-in">
                            <div className="bg-[#151515] w-full max-w-5xl rounded-[4rem] border border-white/10 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-8 border-b border-white/5 bg-black/20 flex justify-between items-center text-white italic">
                                    <h2 className="text-3xl font-black uppercase italic tracking-tighter">{isEditing ? 'Update Records' : 'Artisan Enrollment'}</h2>
                                    <button type="button" onClick={() => setShowEnrollModal(false)} className="p-3 text-gray-500 hover:text-white transition-all"><Icon name="x" size={32}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-12 custom-scrollbar text-white italic text-left">
                                    <form onSubmit={handleEnrollSubmit} className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                                        <div className="space-y-10">
                                            <div className="aspect-square bg-black rounded-[4rem] border-4 border-white/5 overflow-hidden relative shadow-inner">
                                                {isCapturing ? <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover scale-x-[-1]" /> : capturedPhoto ? <img src={capturedPhoto} className="w-full h-full object-cover" /> : <div className="h-full flex flex-col items-center justify-center text-gray-800"><Icon name="id-card" size={100} /><p className="mt-4 font-black uppercase text-[11px] tracking-widest italic">Awaiting Capture</p></div>}
                                                <div className="absolute bottom-8 inset-x-8 flex gap-4">
                                                    <button type="button" onClick={() => { setIsCapturing(true); if(videoRef.current) navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => { streamRef.current = s; videoRef.current.srcObject = s; }); }} className="flex-1 py-5 bg-white/5 border border-white/10 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-white/10 transition-all italic">Open Camera</button>
                                                    {isCapturing && <button type="button" onClick={capturePhoto} className="p-5 bg-emerald-600 rounded-2xl active:scale-90 transition-all shadow-xl"><Icon name="camera" size={28}/></button>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8 h-fit">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">First Name</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold outline-none focus:border-blue-500 transition-all text-white" value={enrollForm.name} onChange={e => setEnrollForm({...enrollForm, name: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Surname</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold outline-none focus:border-blue-500 transition-all text-white" value={enrollForm.surname} onChange={e => setEnrollForm({...enrollForm, surname: e.target.value})} /></div>
                                            <div className="col-span-2 space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Residential Address</label><input required className="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 font-bold outline-none focus:border-blue-500 transition-all text-white" value={enrollForm.address} onChange={e => setEnrollForm({...enrollForm, address: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">ID Number</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-mono text-white" value={enrollForm.idNumber} onChange={e => setEnrollForm({...enrollForm, idNumber: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Contact No</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold text-white" value={enrollForm.contactNumber} onChange={e => setEnrollForm({...enrollForm, contactNumber: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Tax Number</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold text-white" value={enrollForm.taxNumber} onChange={e => setEnrollForm({...enrollForm, taxNumber: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">UIF Number</label><input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold text-white" value={enrollForm.uifNumber} onChange={e => setEnrollForm({...enrollForm, uifNumber: e.target.value})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Rate Agreement (R/hr)</label><input required type="number" className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold text-white" value={enrollForm.hourlyRate} onChange={e => setEnrollForm({...enrollForm, hourlyRate: e.target.value})} /></div>
                                            <div className="col-span-2 space-y-2 mt-4"><label className="text-[11px] font-black uppercase text-orange-500 ml-4 tracking-widest italic italic">Secret Terminal PIN (4 Digits)</label><input required className="w-full bg-black border-2 border-orange-500/20 rounded-3xl p-6 text-center text-4xl font-black text-orange-500 tracking-[0.5em]" maxLength="4" value={enrollForm.personalCode} onChange={e => setEnrollForm({...enrollForm, personalCode: e.target.value})} /></div>
                                            <button type="submit" className="col-span-2 mt-8 py-8 bg-white text-black rounded-[3rem] font-black uppercase tracking-[0.4em] text-sm shadow-2xl active:scale-95 transition-all italic">{isEditing ? 'Save Changes' : 'Commit Enrollment'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DELETE SECURITY MODAL */}
                    {showDeleteModal && (
                        <div className="fixed inset-0 z-[1200] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-[#151515] p-12 rounded-[5rem] text-center border-2 border-red-500/20 w-full max-w-sm shadow-2xl">
                                <div className="p-6 bg-red-500/10 text-red-500 rounded-full w-fit mx-auto mb-8 shadow-inner"><Icon name="shield-alert" size={54} /></div>
                                <h3 className="text-xl font-black uppercase italic text-white mb-2 italic">Authorize Removal</h3>
                                <p className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-10 italic">Deleting Profile: {targetDelete?.name}</p>
                                <form onSubmit={handleDeleteConfirm}>
                                    <input type="password" autoFocus placeholder="Enter Super PIN" className="w-full bg-black border border-white/10 rounded-2xl p-6 text-center text-3xl font-mono tracking-[0.5em] mb-8 outline-none focus:border-red-500 transition-all text-white italic" value={superPinInput} onChange={e => setSuperPinInput(e.target.value)} />
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setShowDeleteModal(false)} className="flex-1 py-5 bg-white/5 rounded-2xl font-black uppercase text-[10px] tracking-widest text-white italic">Cancel</button>
                                        <button type="submit" className="flex-1 py-5 bg-red-600 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl text-white italic">Confirm Delete</button>
                                    </div>
                                </form>
                                {superPinError && <p className="mt-6 text-red-500 text-[10px] font-black uppercase animate-pulse italic">Authorization Denied</p>}
                            </div>
                        </div>
                    )}

                    {!hideTaskbar && (
                        <footer className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/90 backdrop-blur-3xl p-3 rounded-[3rem] border border-white/10 flex items-center space-x-3 shadow-2xl z-[200] scale-90 md:scale-100 transition-all animate-in slide-in-from-bottom-5 no-print">
                            <NavItem icon="home" tooltip="Main Menu" active={appMode === 'home'} colorClass="bg-white/20 text-white shadow-lg shadow-white/10" onClick={() => { setAppMode('home'); setView('dashboard'); setSelectedEmployee(null); }} />
                            <NavItem icon="clock" tooltip="Clocking Terminal" active={appMode === 'employee'} colorClass="bg-[#ff8c00] text-white shadow-lg shadow-[#ff8c00]/20" onClick={() => { setAppMode('employee'); setView('dashboard'); setSelectedEmployee(null); }} />
                            <NavItem icon="kanban" tooltip="Kanban Cards" active={appMode === 'kanban'} colorClass="bg-blue-600 text-white shadow-lg shadow-blue-600/20" onClick={() => { setAppMode('kanban'); setView('dashboard'); setSelectedEmployee(null); }} />
                            <div className="w-[1px] h-10 bg-white/10 mx-2" />
                            <NavItem icon={isLocked ? "lock" : "unlock"} tooltip="Access Management Hub" active={!isLocked} colorClass="text-blue-500 bg-blue-500/10 shadow-[0_0_30px_#3b82f622]" onClick={() => isLocked ? setShowPinModal(true) : setIsLocked(true)} />
                            {!isLocked && (
                                <div className="flex items-center space-x-3 border-l border-white/10 pl-3 animate-in slide-in-from-left-10 duration-500">
                                    <NavItem icon="users" tooltip="Staff Registry & Enrollment" active={appMode === 'admin'} colorClass="bg-blue-600 text-white shadow-lg shadow-blue-600/20" onClick={() => { setAppMode('admin'); setView('dashboard'); }} />
                                    <NavItem icon="bar-chart-3" tooltip="Labor & Work Analytics" active={appMode === 'analytics'} colorClass="bg-emerald-600 text-white shadow-lg shadow-emerald-600/20" onClick={() => { setAppMode('analytics'); setView('dashboard'); }} />
                                    <NavItem icon="banknote" tooltip="Payroll Processing" active={appMode === 'payroll'} colorClass="bg-amber-500 text-white shadow-lg shadow-amber-500/20" onClick={() => setAppMode('payroll')} />
                                    <NavItem icon="scale" tooltip="Time Off Node" active={appMode === 'hr'} colorClass="bg-purple-600 text-white shadow-lg shadow-purple-600/20" onClick={() => setAppMode('hr')} />
                                    <NavItem icon="smartphone" tooltip="Mobile Deployment" active={appMode === 'mobile'} colorClass="bg-pink-600 text-white shadow-lg shadow-pink-600/20" onClick={() => setAppMode('mobile')} />
                                </div>
                            )}
                        </footer>
                    )}

                    {showPinModal && (
                        <div className="fixed inset-0 z-[900] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 animate-in fade-in no-print">
                            <div className="bg-[#151515] p-12 rounded-[5rem] text-center border border-white/10 w-full max-w-sm shadow-2xl italic">
                                <div className={`p-6 rounded-full mb-8 mx-auto w-fit italic ${adminPinError ? 'bg-red-500/20 text-red-500 animate-shake' : 'bg-blue-500/10 text-blue-500 shadow-inner'}`}><Icon name="shield-alert" size={54} /></div>
                                <p className="text-[11px] font-black uppercase tracking-[0.3em] text-gray-500 mb-12 italic text-center">Supervisor Access Required</p>
                                <div className="flex justify-center space-x-4 mb-8">
                                    {[1, 2, 3, 4].map(dot => (
                                        <div key={dot} className={`w-4 h-4 rounded-full transition-all duration-300 ${pinInput.length >= dot ? (adminPinError ? 'bg-red-500' : 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]') : 'bg-white/10'}`} />
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-4 text-white mb-4">
                                    {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'C', 0, 'X'].map(n => (
                                        <button type="button" key={n} onClick={() => n === 'X' ? setShowPinModal(false) : n === 'C' ? setPinInput('') : handleAdminPin(n.toString())} className="h-16 bg-white/5 rounded-2xl flex items-center justify-center text-2xl font-black active:bg-blue-600 transition-all text-white">{n}</button>
                                    ))}
                                </div>
                                <button type="button" onClick={submitAdminPin} disabled={pinInput.length !== 4} className={`w-full h-16 rounded-2xl flex items-center justify-center text-2xl font-black transition-all ${pinInput.length === 4 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-xl' : 'bg-white/5 text-gray-600'}`}>OK</button>
                            </div>
                        </div>
                    )}
                </div>

                {/* --- HARDCOPY PDF EXPORT ENGINE OVERLAY --- */}
                {printingEmployee && (
                    <div className="print-wrapper fixed inset-0 z-[9999] min-h-screen overflow-y-auto bg-white py-10 flex flex-col items-center not-italic font-sans">
                        <div className="no-print bg-blue-100 text-blue-800 p-3 text-center text-sm font-bold mb-6 rounded-lg border border-blue-200 max-w-2xl w-full">
                            💡 Hint: Print this page using your browser. Select A4 and disable margins for the best result.
                        </div>
                        <div id="pdf-export-container" className="bg-white text-black p-12 font-sans w-full max-w-4xl">
                            <div className="border-b-2 border-black pb-6 mb-8 flex justify-between items-end avoid-break">
                                <div>
                                    <h1 className="text-4xl font-black uppercase tracking-tighter">TimberSmith Joinery</h1>
                                    <p className="text-sm font-bold uppercase tracking-widest text-gray-500 mt-1">Labor Archive Summary</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-bold">Date Printed: {new Date().toLocaleDateString()}</p>
                                    <p className="text-sm text-gray-500">Period: {startDate} to {endDate}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-8 mb-8 border border-gray-300 p-6 rounded-2xl avoid-break">
                                <div>
                                    <p className="text-xs font-bold uppercase text-gray-500">Artisan Details</p>
                                    <p className="text-2xl font-black uppercase mt-1">{printingEmployee.name} {printingEmployee.surname}</p>
                                    <p className="text-sm font-bold mt-1 text-blue-600">{printingEmployee.role} {printingEmployee.isArchived && <span className="text-red-500 ml-2">(ARCHIVED)</span>}</p>
                                </div>
                                <div>
                                    <p className="text-xs font-bold uppercase text-gray-500 mb-2">Identification & Rate</p>
                                    <p className="text-sm"><strong>ID Number:</strong> {printingEmployee.idNumber || 'N/A'}</p>
                                    <p className="text-sm"><strong>Contact:</strong> {printingEmployee.contactNumber || 'N/A'}</p>
                                    <p className="text-sm"><strong>Agreed Rate:</strong> R {printingEmployee.hourlyRate || '0'}/hr</p>
                                </div>
                            </div>

                            <div className="mb-8 avoid-break">
                                <h3 className="text-lg font-black uppercase mb-4 border-b border-gray-200 pb-2">Hours Verification Summary</h3>
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="bg-gray-100 p-4 rounded-xl text-center">
                                        <p className="text-xs font-bold uppercase text-gray-500">Selected Range Total</p>
                                        <p className="text-2xl font-black text-blue-600">{formatTime(calculateEmployeeHours(printingEmployee, 'custom', startDate, endDate))}</p>
                                    </div>
                                    <div className="bg-gray-100 p-4 rounded-xl text-center">
                                        <p className="text-xs font-bold uppercase text-gray-500">Monthly Accumulation</p>
                                        <p className="text-2xl font-black text-purple-600">{formatTime(printingEmployee.monthlyHours)}</p>
                                    </div>
                                    <div className="bg-gray-100 p-4 rounded-xl text-center">
                                        <p className="text-xs font-bold uppercase text-gray-500">Estimated Range Gross</p>
                                        <p className="text-2xl font-black text-emerald-600">R {(calculateEmployeeHours(printingEmployee, 'custom', startDate, endDate) * (parseFloat(printingEmployee.hourlyRate) || 0)).toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Section 1: Itemized Shift & Clocking History */}
                            <div className="mb-8">
                                <h3 className="text-lg font-black uppercase mb-4 border-b border-gray-200 pb-2 avoid-break">Itemized Shift & Clocking History</h3>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-xs uppercase tracking-widest avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                            <th className="p-3 border border-gray-300 font-bold">Date</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Clock In</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Clock Out</th>
                                            <th className="p-3 border border-gray-300 font-bold text-center">Total Hours</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            const rangeShifts = (printingEmployee.shifts || []).filter(s => s.date >= startDate && s.date <= endDate);
                                            const shiftDates = new Set(rangeShifts.map(s => s.date));
                                            const rangeHistory = (printingEmployee.history || []).filter(h => h.date >= startDate && h.date <= endDate && !shiftDates.has(h.date));
                                            
                                            let combined = [
                                                ...rangeShifts.map(s => ({ ...s, type: 'shift' })),
                                                ...rangeHistory.map(h => ({ ...h, type: 'history', clockIn: '-', clockOut: '-' }))
                                            ];

                                            if (printingEmployee.status === 'In' && printingEmployee.shiftStartTime) {
                                                const shiftStart = new Date(printingEmployee.shiftStartTime);
                                                const shiftStartStr = getLocalDateString(shiftStart);
                                                if (shiftStartStr >= startDate && shiftStartStr <= endDate) {
                                                    const now = new Date();
                                                    combined.push({
                                                        date: shiftStartStr,
                                                        clockIn: shiftStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                                                        clockOut: 'Active Now',
                                                        hours: parseFloat(((now - shiftStart) / 3600000).toFixed(2)),
                                                        type: 'shift'
                                                    });
                                                }
                                            }

                                            combined.sort((a, b) => a.date > b.date ? 1 : -1);

                                            if (combined.length === 0) {
                                                return <tr className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}><td colSpan="4" className="p-4 text-center text-gray-500 font-bold">No labor hours recorded in the selected period.</td></tr>;
                                            }

                                            return combined.map((item, i) => (
                                                <tr key={i} className="avoid-break" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                                    <td className="p-3 border border-gray-300">{item.date}</td>
                                                    <td className="p-3 border border-gray-300 text-center font-mono">{item.clockIn}</td>
                                                    <td className="p-3 border border-gray-300 text-center font-mono font-bold text-blue-600">{item.clockOut}</td>
                                                    <td className="p-3 border border-gray-300 font-mono font-bold text-center">{formatTime(item.hours)}</td>
                                                </tr>
                                            ));
                                        })()}
