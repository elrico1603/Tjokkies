                const now = new Date();

                        setKanbanCards(prev => [...prev, { id: Date.now().toString(), ...cardForm, createdAt: new Date().toISOString() }]);
                    }
                }
                
                setShowCardEditor(false);
                setKanbanEditingId(null);
                setCardForm(initialCardForm);
                announce('Kanban card saved');
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setCardForm({...cardForm, photo: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const openCardEditor = (card = null) => {
                if (card) {
                    setCardForm(card);
                    setKanbanEditingId(card.id);
                } else {
                    setCardForm(initialCardForm);
                    setKanbanEditingId(null);
                }
                setShowCardEditor(true);
            };

            const handlePrintKanban = (card) => {
                setPrintingCard(card);
                setTimeout(() => { window.print(); setPrintingCard(null); }, 800);
            };

            // ==========================================
            // SECTION 5: ORDERING MANAGEMENT LOGIC
            // ==========================================
            const handleSaveOrder = async (e) => {
                e.preventDefault();
                if (!orderForm.title.trim()) return;
                
                const newOrder = {
                    ...orderForm,
                    updatedAt: new Date().toISOString()
                };

                if (isCloudLive) {
                    if (orderEditingId) {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('orders').doc(orderEditingId).update(newOrder);
                    } else {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('orders').add({...newOrder, createdAt: new Date().toISOString()});
                    }
                } else {
                    if (orderEditingId) {
                        setOrders(prev => prev.map(o => o.id === orderEditingId ? { ...o, ...newOrder } : o));
                    } else {
                        setOrders(prev => [...prev, { id: Date.now().toString(), ...newOrder, createdAt: new Date().toISOString() }]);
                    }
                }
                
                setShowOrderModal(false);
                setOrderEditingId(null);
                setOrderForm({ title: '', notes: '', photo: '', status: orderCategory });
                announce('Order record saved');
            };

            const handleOrderPhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setOrderForm({...orderForm, photo: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const openOrderEditor = (order = null) => {
                if (order) {
                    setOrderForm(order);
                    setOrderEditingId(order.id);
                } else {
                    setOrderForm({ title: '', notes: '', photo: '', status: orderCategory });
                    setOrderEditingId(null);
                }
                setShowOrderModal(true);
            };

            // ==========================================
            // SECTION 6: SECURE PIN PAD LOGIC
            // ==========================================
            const handleAdminPin = (digit) => {
                if (pinInput.length < 4) {
                    setPinInput(pinInput + digit);
                }
            };

            const submitAdminPin = () => {
                if (pinInput === ADMIN_PIN || pinInput === SUPER_USER_PIN) {
                    setIsLocked(false); 
                    setShowPinModal(false); 
                    setPinInput(''); 
                    setAppMode(targetAdminMode || 'admin'); 
                    setView('dashboard');
                    setTargetAdminMode(null);
                } else {
                    setAdminPinError(true);
                    setTimeout(() => { setPinInput(''); setAdminPinError(false); }, 800);
                }
            };

            const handlePersonalPinDigit = (digit) => {
                if (personalPinInput.length < 4) {
                    setPersonalPinInput(personalPinInput + digit);
                }
            };

            const submitPersonalPin = () => {
                if (personalPinInput === (selectedEmployee?.personalCode || "")) {
                    setView('emp_home'); 
                    setPersonalPinInput('');
                    setPendingAction('normal');
                } else {
                    setPersonalPinError(true); 
                    setTimeout(() => { setPersonalPinInput(''); setPersonalPinError(false); }, 800);
                }
            };

            const handleSupervisorApprovalDigit = (digit) => {
                if (supervisorApprovalPinInput.length < 4) {
                    setSupervisorApprovalPinInput(supervisorApprovalPinInput + digit);
                }
            };

            const submitSupervisorPin = () => {
                if (supervisorApprovalPinInput === ADMIN_PIN || supervisorApprovalPinInput === SUPER_USER_PIN) {
                    if (pendingAction === 'borrow_money') {
                        processMoneyBorrow(selectedEmployee);
                    } else if (pendingAction === 'archive') {
                        setView('emp_archive_reason');
                    } else {
                        processClockEvent(selectedEmployee);
                    }
                    setSupervisorApprovalPinInput('');
                } else {
                    setSupervisorApprovalPinError(true);
                    setTimeout(() => { setSupervisorApprovalPinInput(''); setSupervisorApprovalPinError(false); }, 800);
                }
            };

            // ==========================================
            // SECTION 7: HR NOTIFICATION ENGINE
            // ==========================================
            const notifyHR = async (subject, htmlBody) => {
                if (!isCloudLive) return;
                try {
                    const hrEmail = "janah@tsjoinery.co.za"; 
                    
                    await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('mail').add({
                        to: hrEmail,
                        message: {
                            subject: `TimberSmith Alert: ${subject}`,
                            html: `<div style="font-family: Arial, sans-serif; padding: 20px; border: 1px solid #ccc; border-radius: 10px;">
                                <h2 style="color: #ff8c00;">TimberSmith HR Notification</h2>
                                <p style="font-size: 16px;">${htmlBody}</p>
                                <hr style="border: 1px solid #eee; margin-top: 20px;" />
                                <p style="font-size: 10px; color: #888;">Automated secure message from the TimberSmith Workforce Terminal</p>
                            </div>`
                        },
                        timestamp: new Date().toISOString()
                    });
                } catch(e) {
                    console.error("Failed to notify HR:", e);
                }
            };

            // ==========================================
            // SECTION 8: SAFE TRANSACTION ENGINES
            // ==========================================
            const processMoneyBorrow = async (emp) => {
                try {
                    setLastClockResult('HR_Request');
                    setView('success_screen');
                    setPersonalPinInput('');
                    setSupervisorApprovalPinInput('');

                    const baseAmount = parseFloat(borrowAmount) || 0;
                    const fee = borrowMethod === 'Immediate Payment' ? 75 : 0;
                    const totalAmount = baseAmount + fee;
                    const dateStr = getLocalDateString(new Date());
                    
                    const advance = { 
                        id: Date.now().toString() + Math.floor(Math.random()*1000).toString(),
                        date: dateStr, 
                        amount: totalAmount, 
                        baseAmount: baseAmount, 
                        fee: fee, 
                        reason: borrowReason || 'Cash Advance', 
                        method: borrowMethod || 'Cash', 
                        months: parseInt(borrowMonths) || 1,
                        paidInFull: false,
                        photo: capturedBorrowPhoto || '', 
                        timestamp: new Date().toISOString() 
                    };
                    
                    let newAdvances = [...(emp.advances || [])]; 
                    newAdvances.push(advance);
                    
                    announce(`Your request has been send through to HR.`);
                    
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, advances: newAdvances } : e));
                    
                    setTimeout(() => {
                        setView('dashboard'); 
                        setSelectedEmployee(null);
                        setPendingAction('normal'); 
                        setBorrowAmount(''); 
                        setBorrowReason(''); 
                        setBorrowMethod(''); 
                        setBorrowMonths('1');
                        setCapturedBorrowPhoto(null);
                        setLastClockResult(null);
                    }, 4000);
                    
                    if (isCloudLive) {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id).update({ advances: newAdvances });
                        notifyHR('Cash Advance Approved', `<b>Artisan:</b> ${emp.name} ${emp.surname}<br/><b>Amount:</b> R${totalAmount}<br/><b>Reason:</b> ${borrowReason || 'Cash Advance'}<br/><b>Method:</b> ${borrowMethod || 'Cash'}<br/><b>Repayment Terms:</b> ${parseInt(borrowMonths) || 1} Month(s)`);
                    }
                } catch (error) {
                    console.error("Crash prevented in processMoneyBorrow:", error);
                    setLastClockResult('HR_Request');
                    setView('success_screen');
                }
            };

            const markAdvancePaid = async (emp, advanceId) => {
                try {
                    const newAdvances = (emp.advances || []).map(adv => 
                        adv.id === advanceId ? { ...adv, paidInFull: true } : adv
                    );
                    
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, advances: newAdvances } : e));
                    setDetailsEmp(prev => ({ ...prev, advances: newAdvances }));

                    if (isCloudLive) {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id).update({ advances: newAdvances });
                    }
                    announce("Record updated to paid in full.");
                } catch (err) {
                    console.error("Error marking advance paid:", err);
                }
            };

            const processArchive = async (emp) => {
                try {
                    setLastClockResult('Archive');
                    setView('success_screen');
                    setPersonalPinInput('');
                    setSupervisorApprovalPinInput('');

                    const dateStr = getLocalDateString(new Date());
                    announce(`${emp.name} has been formally archived.`);
                    
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, isArchived: true, archiveReason: archiveReason, status: 'Archived' } : e));

                    setTimeout(() => {
                        setView('dashboard'); 
                        setSelectedEmployee(null);
                        setPendingAction('normal'); 
                        setArchiveReason('');
                        setLastClockResult(null);
                    }, 3500);
                    
                    if (isCloudLive) {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id).update({ isArchived: true, archiveReason: archiveReason, status: 'Archived', archiveDate: dateStr }); 
                        notifyHR('Profile Archived', `<b>Artisan:</b> ${emp.name} ${emp.surname}<br/><b>Status:</b> Archived<br/><b>Reason:</b> ${archiveReason}`);
                    }
                } catch(e) {
                    console.error("Crash prevented in processArchive:", e);
                }
            };

            const processClockEvent = async (emp) => {
                try {
                    const clockTime = new Date();
                    let newStatus;
                    let actionMsg;

                    if (pendingAction === 'time_off_out') {
                        newStatus = 'Break';
                        actionMsg = `Time off logged: ${timeOffReason}`;
                    } else if (pendingAction === 'time_off_in') {
                        newStatus = 'In';
                        actionMsg = `Returned to work.`;
                    } else {
                        newStatus = emp.status === 'In' ? 'Out' : 'In';
                        actionMsg = newStatus === 'In' ? `You have clocked in.` : `You have clocked out.`;
                    }
                    
                    setLastClockResult(newStatus);
                    setView('success_screen'); 
                    setPersonalPinInput('');
                    setSupervisorApprovalPinInput('');

                    announce(actionMsg);

                    let updateData = { status: newStatus, lastClock: clockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };

                    if (newStatus === 'Break') {
                        updateData.currentBreakReason = timeOffReason;
                        
                        let breaks = [...(emp.breaks || [])];
                        breaks.push({
                            id: Date.now().toString(),
                            date: getLocalDateString(clockTime),
                            leftAt: clockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            returnedAt: null,
                            reason: timeOffReason
                        });
                        updateData.breaks = breaks;
                    } else if (newStatus === 'In') {
                        updateData.currentBreakReason = null;
                        
                        if (pendingAction === 'time_off_in') {
                            let breaks = [...(emp.breaks || [])];
                            if (breaks.length > 0) {
                                const lastBreakIdx = breaks.map(b => b.returnedAt).lastIndexOf(null);
                                if (lastBreakIdx > -1) {
                                    breaks[lastBreakIdx] = { ...breaks[lastBreakIdx], returnedAt: clockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                                } else {
                                    breaks[breaks.length - 1] = { ...breaks[breaks.length - 1], returnedAt: clockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                                }
                            }
                            updateData.breaks = breaks;
                        }
                    }

                    if (newStatus === 'In') {
                        updateData.shiftStartTime = clockTime.toISOString();
                    } else {
                        const startTime = new Date(emp.shiftStartTime || clockTime);
                        const shiftHours = parseFloat(((clockTime - startTime) / 3600000).toFixed(2));
                        const todayStr = getLocalDateString(clockTime);
                        
                        let history = [...(emp.history || [])]; 
                        const existingToday = history.findIndex(h => h.date === todayStr);
                        if (existingToday > -1) {
                            history[existingToday] = { ...history[existingToday], hours: history[existingToday].hours + shiftHours };
                        } else {
                            history.push({ date: todayStr, hours: shiftHours });
                        }

                        let shifts = [...(emp.shifts || [])]; 
                        shifts.push({
                            date: todayStr,
                            clockIn: startTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            clockOut: clockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            hours: shiftHours
                        });

                        updateData.shifts = shifts;
                        updateData.todayHours = history.find(h => h.date === todayStr).hours;
                        updateData.weeklyHours = (emp.weeklyHours || 0) + shiftHours;
                        updateData.monthlyHours = (emp.monthlyHours || 0) + shiftHours;
                        updateData.history = history;
                        updateData.shiftStartTime = null;
                    }

                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, ...updateData } : e));
                    
                    setTimeout(() => { 
                        setView('dashboard'); 
                        setSelectedEmployee(null); 
                        setScanComplete(false); 
                        setPendingAction('normal'); 
                        setTimeOffReason('');
                        setLastClockResult(null); 
                    }, 3500);
                    
                    if (isCloudLive) {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id).update(updateData); 
                        if (pendingAction === 'time_off_out') {
                            notifyHR('Time Off Logged', `<b>Artisan:</b> ${emp.name} ${emp.surname}<br/><b>Action:</b> Started Time Off<br/><b>Reason:</b> ${timeOffReason}`);
                        }
                    }
                } catch(e) {
                    console.error("Crash prevented in processClockEvent:", e);
                }
            };

            const handleEnrollSubmit = async (e) => {
                e.preventDefault();
                const profileData = { ...enrollForm, photo: capturedPhoto };
                if (isCloudLive) try {
                    if (isEditing) await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(editingId).update(profileData);
                    else await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').add({ ...profileData, status: 'Out', isArchived: false, todayHours: 0, yesterdayHours: 0, weeklyHours: 0, monthlyHours: 0, history: [], shifts: [], breaks: [] });
                    setShowEnrollModal(false); setIsEditing(false); setEditingId(null);
                    setEnrollForm({ name: '', surname: '', address: '', idNumber: '', taxNumber: '', uifNumber: '', contactNumber: '', personalCode: '', hourlyRate: '0' });
                    setCapturedPhoto(null);
                } catch (e) {}
            };

            const openEditor = (emp) => {
                setEnrollForm({ name: emp.name||'', surname: emp.surname||'', address: emp.address||'', idNumber: emp.idNumber||'', taxNumber: emp.taxNumber||'', uifNumber: emp.uifNumber||'', contactNumber: emp.contactNumber||'', personalCode: emp.personalCode||'', hourlyRate: emp.hourlyRate||'0' });
                setCapturedPhoto(emp.photo||null); setEditingId(emp.id); setIsEditing(true); setShowEnrollModal(true);
            };

            const handleDeleteConfirm = async (e) => {
                e.preventDefault();
                if (superPinInput === SUPER_USER_PIN) {
                    await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(targetDelete.id).delete();
                    setShowDeleteModal(false); setTargetDelete(null); setSuperPinInput('');
                } else { setSuperPinError(true); setTimeout(() => setSuperPinError(false), 2000); }
            };

            const capturePhoto = () => {
                const canvas = canvasRef.current; const video = videoRef.current;
                canvas.width = 320; canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                setCapturedPhoto(canvas.toDataURL('image/jpeg', 0.6)); setIsCapturing(false);
                if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
            };

            // ==========================================
            // SECTION 12: APP RENDER UI
            // ==========================================
            const PhotoAvatar = ({ emp, size = 100, className = "" }) => (
                <div className={`rounded-[2.5rem] flex items-center justify-center overflow-hidden bg-[#111] border-2 border-white/10 shadow-inner ${className}`} style={{ width: size, height: size }}>
                    {emp.photo ? <img src={emp.photo} className="w-full h-full object-cover" /> : <span className="font-black text-white/10 uppercase" style={{ fontSize: size * 0.4 }}>{emp.name?.[0]}</span>}
                </div>
            );

            const NavItem = ({ icon, tooltip, active, onClick, colorClass = "" }) => (
                <div className="relative group flex flex-col items-center">
                    <div className="absolute bottom-full mb-4 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none translate-y-2 group-hover:translate-y-0 z-[200]">
                        <div className="bg-black/95 px-4 py-2 rounded-xl border border-white/10 shadow-2xl">
                            <p className="text-[10px] font-black uppercase tracking-widest text-white italic">{tooltip}</p>
                        </div>
                        <div className="tooltip-arrow mx-auto" />
                    </div>
                    <button type="button" onClick={onClick} className={`p-4 rounded-2xl transition-all duration-300 ${active ? (colorClass || 'bg-white/10 text-white ring-2 ring-current scale-110 shadow-xl') : 'text-gray-600 hover:bg-white/5 hover:text-gray-300'}`}>
                        <Icon name={icon} size={22} strokeWidth={active ? 3 : 2} />
                    </button>
                </div>
            );

            const hideTaskbar = ['scanning', 'personal_pin_entry', 'supervisor_approval', 'emp_archive_reason', 'success_screen', 'emp_time_off', 'emp_money_borrowed'].includes(view);

            return (
                <Fragment>
                {/* --- MAIN APP (Hides during PDF Export or Kanban generation to prevent browser print duplication) --- */}
                <div className={`h-screen w-full bg-[#0c0c0c] flex flex-col relative overflow-hidden text-white italic ${isExportingPDF || printingCard ? 'hidden no-print' : ''}`}>
                    <canvas ref={canvasRef} className="hidden" />
                    
                    <header className="p-6 border-b-2 border-[#ff8c00] bg-black/40 backdrop-blur-xl sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <div className="p-3 rounded-2xl bg-[#ff8c00]/10 text-[#ff8c00] shadow-[0_0_20px_rgba(255,140,0,0.1)]"><Icon name="hard-hat" size={28} /></div>
                            <div>
                                <h1 className="text-3xl font-black italic tracking-tighter uppercase leading-none italic"><span className="text-[#ff8c00]">TimberSmith</span> <span className="text-white">Joinery</span></h1>
                                <p className={`text-[9px] font-black uppercase tracking-[0.3em] mt-1 ${isCloudLive ? 'text-emerald-500' : 'text-orange-500 animate-pulse'}`}>• Terminal Synchronized</p>
                            </div>
                        </div>
                        <div className="text-right text-white italic">
                            <p className="text-2xl font-mono font-black leading-none">{currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                            <p className="text-[10px] font-black text-gray-500 uppercase mt-2 tracking-widest">{currentTime.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'short' })}</p>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-8 custom-scrollbar pb-36">
                        
                        {/* 0. NEW HOME / MAIN DASHBOARD SCREEN */}
                        {appMode === 'home' && (
                            <div className="flex-1 flex flex-col items-center justify-center min-h-[70vh] animate-in zoom-in-95 duration-500 font-sans">
                                <div className="text-center mb-16">
                                    <div className="p-6 bg-[#ff8c00]/10 text-[#ff8c00] rounded-full inline-block mb-6 shadow-[0_0_50px_rgba(255,140,0,0.2)]">
                                        <Icon name="hard-hat" size={80} strokeWidth={1.5} />
                                    </div>
                                    <h1 className="text-6xl md:text-7xl font-black uppercase italic tracking-tighter text-white">TimberSmith <span className="text-[#ff8c00]">Joinery</span></h1>
                                    <p className="text-xl font-bold uppercase tracking-[0.4em] text-gray-500 mt-4 italic">Management Dashboard</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-6xl px-8">
                                    <button type="button" onClick={() => { setAppMode('employee'); setView('dashboard'); }} className="bg-black/60 p-12 rounded-[4rem] border-2 border-transparent hover:border-[#ff8c00] transition-all group shadow-2xl flex flex-col items-center justify-center gap-6 active:scale-95">
                                        <div className="p-8 bg-[#ff8c00]/10 text-[#ff8c00] rounded-full transition-transform group-hover:scale-110">
                                            <Icon name="clock" size={60} />
                                        </div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-widest text-white">Clocking Terminal</h2>
                                        <p className="text-gray-500 text-sm font-bold uppercase tracking-widest">Time & Attendance</p>
                                    </button>
                                    
                                    <button type="button" onClick={() => {
                                        if (isLocked) {
                                            setTargetAdminMode('kanban');
                                            setShowPinModal(true);
                                        } else {
                                            setAppMode('kanban');
                                            setView('dashboard');
                                        }
                                    }} className="bg-black/60 p-12 rounded-[4rem] border-2 border-transparent hover:border-blue-500 transition-all group shadow-2xl flex flex-col items-center justify-center gap-6 active:scale-95">
                                        <div className="p-8 bg-blue-500/10 text-blue-500 rounded-full transition-transform group-hover:scale-110">
                                            <Icon name="kanban" size={60} />
                                        </div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-widest text-white">Kanban Cards Creator</h2>
                                        <p className="text-gray-500 text-sm font-bold uppercase tracking-widest">Project Management</p>
                                    </button>

                                    <button type="button" onClick={() => setAppMode('ordering_menu')} className="bg-black/60 p-12 rounded-[4rem] border-2 border-transparent hover:border-purple-500 transition-all group shadow-2xl flex flex-col items-center justify-center gap-6 active:scale-95">
                                        <div className="p-8 bg-purple-500/10 text-purple-500 rounded-full transition-transform group-hover:scale-110">
                                            <Icon name="package" size={60} />
                                        </div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-widest text-white">Ordering Management</h2>
                                        <p className="text-gray-500 text-sm font-bold uppercase tracking-widest">Inventory & Supplies</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 0.6 NEW ORDERING MANAGEMENT MENU */}
                        {appMode === 'ordering_menu' && (
                            <div className="flex-1 flex flex-col items-center justify-center min-h-[70vh] animate-in zoom-in-95 duration-500 font-sans">
                                <div className="w-full flex justify-start mb-8 px-8">
                                    <button type="button" onClick={() => setAppMode('home')} className="p-4 bg-white/5 hover:bg-white/10 rounded-full text-white transition-all flex items-center gap-3 font-black uppercase text-xs tracking-widest">
                                        <Icon name="arrow-left" size={20} /> Back to Dashboard
                                    </button>
                                </div>
                                <div className="text-center mb-16">
                                    <div className="p-6 bg-purple-500/10 text-purple-500 rounded-full inline-block mb-6 shadow-[0_0_50px_rgba(168,85,247,0.2)]">
                                        <Icon name="package" size={80} strokeWidth={1.5} />
                                    </div>
                                    <h1 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter text-white">Ordering Management</h1>
                                    <p className="text-xl font-bold uppercase tracking-[0.4em] text-gray-500 mt-4 italic">Select Category</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl px-8">
                                    {/* Red Block */}
                                    <button type="button" onClick={() => { setAppMode('ordering'); setOrderCategory('Not Arrived Yet'); }} className="bg-red-950/20 p-8 rounded-[3rem] border-2 border-red-500/30 hover:border-red-500 transition-all group shadow-[0_0_30px_rgba(239,68,68,0.1)] flex flex-col items-center justify-center gap-4 active:scale-95 text-center">
                                        <div className="p-5 bg-red-500/20 text-red-500 rounded-full transition-transform group-hover:scale-110"><Icon name="truck" size={32} /></div>
                                        <h3 className="text-sm font-black uppercase italic tracking-widest text-red-500">Purchase Orders</h3>
                                        <p className="text-[10px] text-red-400/70 font-bold uppercase tracking-widest">Not Arrived Yet</p>
                                    </button>

                                    {/* Yellow Block */}
                                    <button type="button" onClick={() => { setAppMode('ordering'); setOrderCategory('Incomplete Invoices \\ Delivery'); }} className="bg-yellow-950/20 p-8 rounded-[3rem] border-2 border-yellow-500/30 hover:border-yellow-500 transition-all group shadow-[0_0_30px_rgba(234,179,8,0.1)] flex flex-col items-center justify-center gap-4 active:scale-95 text-center">
                                        <div className="p-5 bg-yellow-500/20 text-yellow-500 rounded-full transition-transform group-hover:scale-110"><Icon name="file-text" size={32} /></div>
                                        <h3 className="text-sm font-black uppercase italic tracking-widest text-yellow-500">Incomplete</h3>
                                        <p className="text-[10px] text-yellow-400/70 font-bold uppercase tracking-widest">Invoices / Delivery</p>
                                    </button>

                                    {/* Green Block */}
                                    <button type="button" onClick={() => { setAppMode('ordering'); setOrderCategory('Purchase Orders & Deliveries Correct'); }} className="bg-emerald-950/20 p-8 rounded-[3rem] border-2 border-emerald-500/30 hover:border-emerald-500 transition-all group shadow-[0_0_30px_rgba(16,185,129,0.1)] flex flex-col items-center justify-center gap-4 active:scale-95 text-center">
                                        <div className="p-5 bg-emerald-500/20 text-emerald-500 rounded-full transition-transform group-hover:scale-110"><Icon name="check-circle" size={32} /></div>
                                        <h3 className="text-sm font-black uppercase italic tracking-widest text-emerald-500">Correct</h3>
                                        <p className="text-[10px] text-emerald-400/70 font-bold uppercase tracking-widest">Orders & Deliveries</p>
                                    </button>

                                    {/* Orange Block */}
                                    <button type="button" onClick={() => { setAppMode('ordering'); setOrderCategory('To Be Returned'); }} className="bg-orange-950/20 p-8 rounded-[3rem] border-2 border-orange-500/30 hover:border-orange-500 transition-all group shadow-[0_0_30px_rgba(249,115,22,0.1)] flex flex-col items-center justify-center gap-4 active:scale-95 text-center">
                                        <div className="p-5 bg-orange-500/20 text-orange-500 rounded-full transition-transform group-hover:scale-110"><Icon name="rotate-ccw" size={32} /></div>
                                        <h3 className="text-sm font-black uppercase italic tracking-widest text-orange-500">To Be Returned</h3>
                                        <p className="text-[10px] text-orange-400/70 font-bold uppercase tracking-widest">Action Required</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 0.7 ORDERING CATEGORY LIST VIEW */}
                        {appMode === 'ordering' && (
                            <div className="animate-in fade-in duration-500 h-full flex flex-col font-sans">
                                <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                                    <div className="flex items-center gap-4">
                                        <button type="button" onClick={() => setAppMode('ordering_menu')} className="p-3 bg-white/5 hover:bg-white/10 rounded-full text-white transition-all">
                                            <Icon name="arrow-left" size={24} />
                                        </button>
                                        <div>
                                            <h2 className={`text-3xl font-black uppercase italic tracking-tighter ${orderCategory === 'Not Arrived Yet' ? 'text-red-500' : orderCategory === 'Incomplete Invoices \\ Delivery' ? 'text-yellow-500' : orderCategory === 'Purchase Orders & Deliveries Correct' ? 'text-emerald-500' : 'text-orange-500'}`}>{orderCategory}</h2>
                                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mt-1">Ordering Management</p>
                                        </div>
                                    </div>
                                    <button type="button" onClick={() => openOrderEditor()} className={`text-white px-8 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl flex items-center space-x-3 active:scale-95 transition-all ${orderCategory === 'Not Arrived Yet' ? 'bg-red-600' : orderCategory === 'Incomplete Invoices \\ Delivery' ? 'bg-yellow-600' : orderCategory === 'Purchase Orders & Deliveries Correct' ? 'bg-emerald-600' : 'bg-orange-600'}`}>
                                        <Icon name="package" size={18} /><span>Create New</span>
                                    </button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 content-start">
                                    {orders.filter(o => o.status === orderCategory).map(order => (
                                        <div key={order.id} className={`bg-[#151515] p-6 rounded-[2.5rem] border flex flex-col shadow-2xl relative group transition-all ${orderCategory === 'Not Arrived Yet' ? 'border-red-500/20 hover:border-red-500/50' : orderCategory === 'Incomplete Invoices \\ Delivery' ? 'border-yellow-500/20 hover:border-yellow-500/50' : orderCategory === 'Purchase Orders & Deliveries Correct' ? 'border-emerald-500/20 hover:border-emerald-500/50' : 'border-orange-500/20 hover:border-orange-500/50'}`}>
                                            <div className="flex gap-4">
                                                <div className="w-24 h-24 rounded-2xl bg-black/50 border border-white/10 overflow-hidden flex-shrink-0">
                                                    {order.photo ? <img src={order.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-600"><Icon name="camera" size={24}/></div>}
                                                </div>
                                                <div className="flex-1">
                                                    <h4 className="font-black text-white uppercase italic text-lg leading-tight line-clamp-2">{order.title}</h4>
                                                    {order.notes && <p className="text-xs text-gray-400 mt-2 font-bold line-clamp-3">{order.notes}</p>}
                                                </div>
                                            </div>
                                            <div className="mt-6 pt-4 border-t border-white/10 flex justify-between items-center">
                                                <p className="text-[9px] text-gray-600 font-black uppercase tracking-widest">Logged: {new Date(order.createdAt).toLocaleDateString()}</p>
                                                <div className="flex gap-2">
                                                    <button type="button" onClick={() => openOrderEditor(order)} className="p-2 text-gray-500 hover:text-white transition-colors"><Icon name="edit-3" size={18}/></button>
                                                    <button type="button" onClick={() => { if(confirm('Delete this record?')) { if(isCloudLive) db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('orders').doc(order.id).delete(); else setOrders(prev => prev.filter(o => o.id !== order.id)); } }} className="p-2 text-gray-500 hover:text-red-500 transition-colors"><Icon name="trash-2" size={18}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {orders.filter(o => o.status === orderCategory).length === 0 && (
                                        <div className="col-span-full flex flex-col items-center justify-center border-2 border-dashed border-white/5 rounded-[3rem] p-16 mt-8">
                                            <div className="p-6 bg-white/5 rounded-full text-gray-600 mb-6"><Icon name="package" size={48} /></div>
                                            <p className="text-gray-500 font-black uppercase text-sm tracking-widest text-center">No Records Found</p>
                                            <p className="text-gray-600 font-bold text-xs mt-2 text-center max-w-sm">Click "Create New" to log an item in this category.</p>
                                        </div>
                                    )}
                                </div>

                                {/* Order Editor Modal */}
                                {showOrderModal && (
                                    <div className="fixed inset-0 z-[1000] bg-black/90 backdrop-blur-3xl flex items-center justify-center p-8 animate-in fade-in overflow-y-auto">
                                        <div className="bg-[#151515] w-full max-w-2xl rounded-[4rem] border border-white/10 shadow-2xl p-10 my-8">
                                            <div className="flex justify-between items-center mb-8">
                                                <h2 className={`text-2xl font-black uppercase italic tracking-tighter ${orderCategory === 'Not Arrived Yet' ? 'text-red-500' : orderCategory === 'Incomplete Invoices \\ Delivery' ? 'text-yellow-500' : orderCategory === 'Purchase Orders & Deliveries Correct' ? 'text-emerald-500' : 'text-orange-500'}`}>{orderEditingId ? 'Edit Record' : 'Create New Record'}</h2>
                                                <button type="button" onClick={() => setShowOrderModal(false)} className="p-3 text-gray-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                            </div>
                                            <form onSubmit={handleSaveOrder} className="space-y-6">
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">What it is (Item/Order Title)</label>
                                                    <input required autoFocus className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold outline-none focus:border-blue-500 transition-all text-white mt-2" value={orderForm.title} onChange={e => setOrderForm({...orderForm, title: e.target.value})} placeholder="E.g., 50x Oak Panels..." />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Notes / Is there something wrong?</label>
                                                    <textarea required className="w-full bg-black/40 border border-white/5 rounded-2xl p-5 font-bold outline-none focus:border-blue-500 transition-all text-white mt-2 resize-none" rows="4" value={orderForm.notes} onChange={e => setOrderForm({...orderForm, notes: e.target.value})} placeholder="Describe the order details or any issues..." />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Photographic Evidence</label>
                                                    <div className="mt-2 flex items-center gap-6 p-6 bg-black/40 border border-white/5 rounded-3xl">
                                                        <div className="w-32 h-32 bg-black/50 border border-white/10 rounded-2xl overflow-hidden flex items-center justify-center shadow-inner">
                                                            {orderForm.photo ? <img src={orderForm.photo} className="w-full h-full object-cover" /> : <Icon name="camera" size={32} className="text-gray-600"/>}
                                                        </div>
                                                        <div className="flex-1 space-y-3">
                                                            <p className="text-xs text-gray-400 font-bold">Upload a picture of the invoice, the damaged item, or the delivery slip.</p>
                                                            <label className="inline-block px-6 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl cursor-pointer font-black text-xs uppercase tracking-widest transition-colors shadow-lg text-white">
                                                                Upload Image
                                                                <input type="file" accept="image/*" className="hidden" onChange={handleOrderPhotoUpload} />
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button type="submit" className={`w-full mt-4 py-6 text-white rounded-3xl font-black uppercase tracking-[0.2em] text-sm shadow-xl active:scale-95 transition-all ${orderCategory === 'Not Arrived Yet' ? 'bg-red-600 hover:bg-red-500' : orderCategory === 'Incomplete Invoices \\ Delivery' ? 'bg-yellow-600 hover:bg-yellow-500' : orderCategory === 'Purchase Orders & Deliveries Correct' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-orange-600 hover:bg-orange-500'}`}>Save Record</button>
                                            </form>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 0.8 KANBAN BOARD SCREEN */}
                        {appMode === 'kanban' && (
                            <div className="animate-in fade-in duration-500 h-full flex flex-col font-sans">
                                <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                                    <div className="flex items-center gap-4">
                                        <button type="button" onClick={() => setAppMode('home')} className="p-3 bg-white/5 hover:bg-white/10 rounded-full text-white transition-all">
                                            <Icon name="arrow-left" size={24} />
                                        </button>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase italic tracking-tighter text-white">Kanban Cards Creator</h2>
                                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mt-1">Active Production Kanbans</p>
                                        </div>
                                    </div>
                                    <button type="button" onClick={() => openCardEditor()} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl flex items-center space-x-3 active:scale-95 transition-all">
                                        <Icon name="user-plus" size={18} /><span>Create Kanban</span>
                                    </button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 flex-1 content-start">
                                    {kanbanCards.map(task => (
                                        <div 
                                            key={task.id} 
                                            className="bg-[#151515] p-6 rounded-[2.5rem] border border-white/5 flex flex-col shadow-2xl relative group hover:border-blue-500/50 transition-all"
                                            style={{ borderLeftColor: task.color || '#3b82f6', borderLeftWidth: '4px' }}
                                        >
                                            <div className="p-3 text-white rounded-xl w-fit mb-4" style={{ backgroundColor: task.color || '#3b82f6' }}>
                                                <Icon name="kanban" size={24} />
                                            </div>
                                            <h4 className="font-black text-white uppercase italic text-lg leading-tight">{task.title}</h4>
                                            {task.description && <p className="text-xs text-gray-500 mt-3 font-bold leading-relaxed">{task.description}</p>}
                                            
                                            <p className="text-[9px] text-gray-600 font-black uppercase tracking-widest mt-6">Created: {new Date(task.createdAt).toLocaleDateString()}</p>
                                            
                                            <div className="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button type="button" onClick={() => handlePrintKanban(task)} className="p-2 bg-black/50 text-blue-400 hover:text-blue-300 rounded-full" title="Print Card"><Icon name="printer" size={16}/></button>
                                                <button type="button" onClick={() => openCardEditor(task)} className="p-2 bg-black/50 text-gray-400 hover:text-white rounded-full"><Icon name="edit-3" size={16}/></button>
                                                <button type="button" onClick={() => { if(confirm('Delete this Kanban?')) { if(isCloudLive) db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('kanban').doc(task.id).delete(); else setKanbanCards(prev => prev.filter(c => c.id !== task.id)); } }} className="p-2 bg-black/50 text-gray-400 hover:text-red-500 rounded-full"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {kanbanCards.length === 0 && (
                                        <div className="col-span-full flex flex-col items-center justify-center border-2 border-dashed border-white/5 rounded-[3rem] p-16 mt-8">
                                            <div className="p-6 bg-white/5 rounded-full text-gray-600 mb-6"><Icon name="kanban" size={48} /></div>
                                            <p className="text-gray-500 font-black uppercase text-sm tracking-widest text-center">No Active Kanbans</p>
                                            <p className="text-gray-600 font-bold text-xs mt-2 text-center max-w-sm">Click "Create Kanban" to start tracking production orders.</p>
                                        </div>
                                    )}
                                </div>

                                {/* Kanban Card Editor Modal */}
                                {showCardEditor && (
                                    <div className="fixed inset-0 z-[1000] bg-black/90 backdrop-blur-3xl flex items-center justify-center p-8 animate-in fade-in overflow-y-auto">
                                        <div className="bg-[#151515] w-full max-w-4xl rounded-[4rem] border border-white/10 shadow-2xl p-10 my-8">
                                            <div className="flex justify-between items-center mb-8">
                                                <h2 className="text-2xl font-black uppercase italic tracking-tighter text-white">{kanbanEditingId ? 'Edit Kanban Card' : 'Create Kanban Card'}</h2>
                                                <button type="button" onClick={() => setShowCardEditor(false)} className="p-3 text-gray-500 hover:text-white transition-all"><Icon name="x" size={24}/></button>
                                            </div>
                                            <form onSubmit={handleSaveCard} className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div className="space-y-6">
                                                    <div>
                                                        <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Card Title / Header</label>
                                                        <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.title} onChange={e => setCardForm({...cardForm, title: e.target.value})} placeholder="E.g., LAMINATING POUCH" />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Location</label>
                                                            <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.location} onChange={e => setCardForm({...cardForm, location: e.target.value})} placeholder="STATIONERY" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Supplier P/No.</label>
                                                            <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.supplierPartNo} onChange={e => setCardForm({...cardForm, supplierPartNo: e.target.value})} placeholder="IBC10" />
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Supplier</label>
                                                            <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.supplier} onChange={e => setCardForm({...cardForm, supplier: e.target.value})} placeholder="AMAZON" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Order Qty</label>
                                                            <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.orderQty} onChange={e => setCardForm({...cardForm, orderQty: e.target.value})} placeholder="100 IN BOX" />
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Delivery Time</label>
                                                        <input required className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.deliveryTime} onChange={e => setCardForm({...cardForm, deliveryTime: e.target.value})} placeholder="NEXT DAY" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Contact Details / Notes</label>
                                                        <textarea className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1 resize-none" rows="3" value={cardForm.contactDetails} onChange={e => setCardForm({...cardForm, contactDetails: e.target.value})} placeholder="Re-order 2 / Other..." />
                                                    </div>
                                                </div>

                                                <div className="space-y-6">
                                                    <div>
                                                        <label className="text-[10px] font-black uppercase text-gray-600 ml-4 italic">Product Photo</label>
                                                        <div className="mt-1 flex items-center gap-4">
                                                            <div className="w-32 h-32 bg-black/50 border border-white/10 rounded-2xl overflow-hidden flex items-center justify-center">
                                                                {cardForm.photo ? <img src={cardForm.photo} className="w-full h-full object-cover" /> : <Icon name="camera" size={32} className="text-gray-600"/>}
                                                            </div>
                                                            <label className="px-6 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl cursor-pointer font-black text-xs uppercase tracking-widest transition-colors shadow-lg">
                                                                Upload Image
                                                                <input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />
                                                            </label>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* Customization Section */}
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-white/10 pt-6 mt-6">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-2 italic">Theme Color</label>
                                                            <div className="flex items-center gap-3 mt-1">
                                                                <input type="color" className="w-14 h-14 bg-black/40 border border-white/5 rounded-2xl p-1 cursor-pointer" value={cardForm.color || '#c2f0b9'} onChange={e => setCardForm({...cardForm, color: e.target.value})} />
                                                                <span className="text-xs font-mono font-bold text-gray-400">{cardForm.color || '#c2f0b9'}</span>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-2 italic">Print Width (px)</label>
                                                            <input type="number" className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.width || '800'} onChange={e => setCardForm({...cardForm, width: e.target.value})} placeholder="800" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-gray-600 ml-2 italic">Print Length (px)</label>
                                                            <input type="number" className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 font-bold outline-none focus:border-blue-500 transition-all text-white mt-1" value={cardForm.height || ''} onChange={e => setCardForm({...cardForm, height: e.target.value})} placeholder="Auto" />
                                                        </div>
                                                    </div>

                                                    <button type="submit" className="w-full mt-4 py-6 bg-blue-600 hover:bg-blue-500 text-white rounded-3xl font-black uppercase tracking-[0.2em] text-sm shadow-xl active:scale-95 transition-all">Save Kanban Card</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 1. Main Artisan Selection Dashboard (Filters out Archived) */}
                        {appMode === 'employee' && view === 'dashboard' && (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 animate-in fade-in">
                                {employees.filter(emp => !emp.isArchived).map(emp => (
                                    <div key={emp.id} onClick={() => { 
                                        setSelectedEmployee(emp); 
                                        setPendingAction('hub_login'); 
                                        setView('personal_pin_entry'); 
                                    }} className="bg-[#151515] p-6 rounded-[3rem] border border-white/5 flex flex-col items-center cursor-pointer shadow-2xl hover:border-[#ff8c00] transition-all group active:scale-95">
                                        <div className="relative mb-6">
                                            <PhotoAvatar emp={emp} size={110} className="group-hover:scale-105 transition-transform duration-500" />
                                            <div className={`absolute -bottom-1 -right-1 w-8 h-8 rounded-full border-[6px] border-[#151515] ${emp.status === 'In' ? 'bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)] animate-pulse' : emp.status === 'Break' ? 'bg-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.5)]' : 'bg-red-500 shadow-md'}`} />
                                        </div>
                                        <p className="font-black text-sm uppercase italic tracking-tighter text-center leading-none text-white italic">{emp.name} {emp.surname}</p>
                                        <p className="text-[9px] text-gray-600 mt-3 font-black uppercase tracking-widest italic">{emp.role}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 2. ANALYTICS View */}
                        {appMode === 'analytics' && !isLocked && (
                             <div className="animate-in duration-500">
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden">
                                    <div className="p-8 border-b border-white/5 bg-black/20 flex items-center justify-between text-white italic">
                                        <h2 className="text-2xl font-black uppercase italic tracking-tighter text-white italic">Labor Analysis Hub</h2>
                                        <div className="flex items-center space-x-4 bg-black/40 px-6 py-3 rounded-full border border-white/5 shadow-inner">
                                            <Icon name="calendar" size={16} className="text-blue-500" />
                                            <div className="flex items-center space-x-2">
                                                <span className={`text-[9px] font-black uppercase ${SA_HOLIDAYS[startDate] ? 'text-red-500' : 'text-gray-500'}`}>{SA_HOLIDAYS[startDate] || 'From'}</span>
                                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className={`text-[10px] outline-none w-32 text-center transition-all ${SA_HOLIDAYS[startDate] ? 'text-red-500 font-black scale-110 border-2 border-red-500 rounded-full py-1 bg-red-500/10' : 'bg-transparent text-white font-bold'}`} />
                                                
                                                <Icon name="arrow-right" size={12} className="text-gray-600 mx-2" />
                                                
                                                <span className={`text-[9px] font-black uppercase ${SA_HOLIDAYS[endDate] ? 'text-red-500' : 'text-gray-500'}`}>{SA_HOLIDAYS[endDate] || 'To'}</span>
                                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className={`text-[10px] outline-none w-32 text-center transition-all ${SA_HOLIDAYS[endDate] ? 'text-red-500 font-black scale-110 border-2 border-red-500 rounded-full py-1 bg-red-500/10' : 'bg-transparent text-white font-bold'}`} />
                                            </div>
                                        </div>
                                        <div className="p-3 bg-emerald-500/10 text-emerald-500 rounded-2xl shadow-xl shadow-emerald-500/5"><Icon name="bar-chart-3" /></div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="bg-black/30 text-[9px] font-black uppercase tracking-[0.2em] text-gray-600 italic">
                                                    <th className="px-8 py-6">Artisan</th>
                                                    <th className="px-4 py-6 text-center">Status</th>
                                                    <th className="px-4 py-6 text-center text-orange-500">Yesterday</th>
                                                    <th className="px-4 py-6 text-center text-emerald-500">Today (Live)</th>
                                                    <th className="px-4 py-6 text-center text-blue-500">Range Total</th>
                                                    <th className="px-4 py-6 text-center">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-white italic">
                                                {employees.map(emp => (
                                                    <tr key={emp.id} className={`hover:bg-white/5 transition-colors group ${emp.isArchived ? 'opacity-50' : ''}`}>
                                                        <td className="px-8 py-6 flex items-center space-x-4 text-left"><PhotoAvatar emp={emp} size={50} /><div><p className="font-black text-sm uppercase leading-none italic">{emp.name} {emp.surname}</p><p className="text-[9px] text-gray-600 font-bold mt-1 uppercase tracking-widest">{emp.role}</p></div></td>
                                                        <td className="px-4 py-6 text-center"><span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${emp.isArchived ? 'bg-gray-500/10 text-gray-500' : emp.status === 'In' ? 'bg-green-500/10 text-green-500 shadow-[0_0_10px_rgba(34,197,94,0.1)]' : emp.status === 'Break' ? 'bg-purple-500/10 text-purple-400' : 'bg-red-500/10 text-red-500'}`}>{emp.isArchived ? 'Archived' : emp.status}</span></td>
                                                        <td className="px-4 py-6 text-center font-mono font-black text-gray-400">{formatTime(calculateEmployeeHours(emp, 'yesterday'))}</td>
                                                        <td className="px-4 py-6 text-center font-mono font-black text-emerald-500">{formatTime(calculateEmployeeHours(emp, 'today'))}</td>
                                                        <td className="px-4 py-6 text-center font-mono font-black text-blue-500">{formatTime(calculateEmployeeHours(emp, 'custom', startDate, endDate))}</td>
                                                        <td className="px-4 py-6 text-center">
                                                            <div className="flex justify-center space-x-2">
                                                                <button type="button" onClick={() => handleExportPDF(emp)} className="p-3 bg-blue-500/10 text-blue-500 rounded-xl hover:bg-blue-500 hover:text-white transition-all" title="Export as PDF"><Icon name="file-down" size={16}/></button>
                                                                {!emp.isArchived && <button type="button" onClick={async () => { await db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id).update({ todayHours: 0, weeklyHours: 0, monthlyHours: 0 }); announce(`${emp.name}'s current counters cleared.`); }} className="p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all" title="Reset Session Hours"><Icon name="refresh-cw" size={16}/></button>}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. STAFF REGISTRY (Admin Node) */}
                        {appMode === 'admin' && !isLocked && (
                             <div className="animate-in p-4">
                                <div className="bg-[#1a1a1a] rounded-[3rem] border border-white/10 shadow-2xl overflow-hidden p-8">
                                    <div className="flex justify-between items-center mb-8 italic text-white">
                                        <h2 className="text-2xl font-black uppercase italic tracking-tighter">Artisan Registry</h2>
                                        <button type="button" onClick={() => { setIsEditing(false); setShowEnrollModal(true); }} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl flex items-center space-x-3 active:scale-95 transition-all">
                                            <Icon name="user-plus" size={18}/><span>Enroll New Artisan</span>
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {employees.map(emp => {
                                            const owesMoney = (emp.advances || []).some(a => !a.paidInFull);
                                            return (
                                            <div key={emp.id} className={`bg-black/40 p-6 rounded-[2.5rem] border border-white/5 flex items-center justify-between group hover:border-blue-500/30 transition-all shadow-inner italic ${emp.isArchived ? 'opacity-50' : ''}`}>
                                                <div className="flex items-center space-x-5 text-left">
                                                    <PhotoAvatar emp={emp} size={70} />
                                                    <div>
                                                        <h3 className="font-black italic uppercase text-white leading-none italic">{emp.name} {emp.surname}</h3>
                                                        <div className="flex items-center mt-2 space-x-2">
                                                            <p className="text-[10px] text-blue-500 font-black uppercase">{emp.role}</p>
                                                            <span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase tracking-widest ${emp.isArchived ? 'bg-red-500/20 text-red-500' : 'bg-emerald-500/20 text-emerald-500'}`}>
                                                                {emp.isArchived ? 'Inactive' : 'Active'}
                                                            </span>
                                                            {owesMoney && !emp.isArchived && (
                                                                <span className="px-2 py-0.5 rounded-full text-[8px] font-black uppercase tracking-widest bg-red-500/20 text-red-500 border border-red-500/50 flex items-center gap-1">
                                                                    <Icon name="shield-alert" size={8} /> Debt
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col gap-3">
                                                    <button type="button" onClick={() => { setDetailsEmp(emp); setShowEmpDetailsModal(true); }} className="p-3 text-white/20 hover:text-blue-500 transition-all active:scale-90" title="View Details & Loans"><Icon name="file-text" size={20}/></button>
                                                    <button type="button" onClick={() => openEditor(emp)} className="p-3 text-white/20 hover:text-blue-500 transition-all active:scale-90"><Icon name="edit-3" size={20}/></button>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* EMP DETAILS & LOANS MODAL (Admin Only) */}
                        {showEmpDetailsModal && detailsEmp && (
                            <div className="fixed inset-0 z-[1200] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6 animate-in fade-in">
                                <div className="bg-[#151515] p-10 rounded-[4rem] border border-white/10 w-full max-w-4xl shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-center mb-8">
                                        <div className="flex items-center space-x-4">
                                            <PhotoAvatar emp={detailsEmp} size={60} />
                                            <div>
                                                <h3 className="text-2xl font-black uppercase text-white italic tracking-tighter">{detailsEmp.name} {detailsEmp.surname}</h3>
                                                <p className="text-[10px] text-gray-500 font-black uppercase tracking-widest">Financial Details & Advances</p>
                                            </div>
                                        </div>
                                        <button type="button" onClick={() => { setShowEmpDetailsModal(false); setDetailsEmp(null); }} className="p-3 text-gray-500 hover:text-white transition-all"><Icon name="x" size={28}/></button>
                                    </div>

                                    <div className="space-y-6">
                                        {(!detailsEmp.advances || detailsEmp.advances.length === 0) ? (
                                            <p className="text-gray-500 font-bold uppercase text-center py-10 italic">No advances on record.</p>
                                        ) : (
                                            [...detailsEmp.advances].reverse().map(adv => (
                                                <div key={adv.id} className={`p-6 rounded-3xl border ${adv.paidInFull ? 'bg-emerald-900/10 border-emerald-500/20' : 'bg-red-900/10 border-red-500/20'} flex flex-col md:flex-row gap-6 justify-between items-center`}>
                                                    <div className="flex items-center space-x-6">
                                                        {adv.photo ? <img src={adv.photo} className="w-16 h-16 rounded-2xl object-cover border border-white/10" alt="Verification" /> : <div className="w-16 h-16 rounded-2xl bg-black/50 flex items-center justify-center"><Icon name="camera" size={20} className="text-gray-600"/></div>}
                                                        <div>
